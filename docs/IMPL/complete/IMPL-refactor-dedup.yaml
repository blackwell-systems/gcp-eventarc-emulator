            - The `perm` helper must be unexported (lowercase p).
            - Do not change any existing function signatures.
            - The `ListMessageBusEnrollments` checkPermission currently uses
              `"eventarc.messageBuses.list"` as the raw string. Look up the correct
              authz key — it is `"ListMessageBusEnrollments"` which maps to
              `"eventarc.messageBuses.listEnrollments"`. Verify by reading
              internal/authz/permissions.go before replacing.
