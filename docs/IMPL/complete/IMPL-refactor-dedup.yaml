            ## Agent D — Startup Log Standardization and Ready Ordering (Tasks 6, 7)

            ### Context
            Three cmd mains mix stdlib `log.Printf` for banner output with the leveled
            `lgr.Info` logger. The "Ready" log fires before the server actually listens
            in two of the three mains. Fix all three files.

            ### `cmd/server/main.go` — Tasks 6 and 7

            **Task 6 — Replace startup `log.Printf` with `lgr.Info`:**

            Line 105 currently reads:
            ```go
            log.Printf("GCP Eventarc Emulator v%s", version)
            ```
            Replace with:
            ```go
            lgr.Info("GCP Eventarc Emulator v%s", version)
            ```

            **Task 7 — Move "Ready" log after listener confirms serving:**

            Currently the "Ready" log fires before `grpcServer.Serve(lis)` is called
            (lines 139-141). The model is `cmd/server-dual/main.go` which uses a
            `readyCh` channel.

            Apply the readyCh pattern:

            1. After `grpcServer := server.NewGRPCServer(...)` (around line 137),
               add:
               ```go
               readyCh := make(chan struct{})
               ```

            2. Replace the existing goroutine block:
               ```go
               go func() {
                   if err := grpcServer.Serve(lis); err != nil {
                       log.Fatalf("Failed to serve: %v", err)
                   }
               }()
               ```
               With:
               ```go
               go func() {
                   lgr.Info("gRPC server listening at %v", lis.Addr())
                   close(readyCh)
                   if err := grpcServer.Serve(lis); err != nil {
                       log.Fatalf("Failed to serve: %v", err)
                   }
               }()
               ```

            3. Remove the two "Ready" log lines that currently appear before the goroutine:
               ```go
               lgr.Info("Server listening at %v", lis.Addr())
               lgr.Info("Ready to accept connections")
               ```

            4. After the goroutine, add:
               ```go
               <-readyCh
               lgr.Info("Ready to accept gRPC connections")
               lgr.Info("gRPC: localhost:%d", listenPort)
               ```

            5. Remove the `lgr.Info("Publisher service registered")` line that
               currently appears after the goroutine (line 149) — it is redundant
               and fires at an odd time relative to readiness.

            ### `cmd/server-rest/main.go` — Tasks 6 and 7

            **Task 6 — Replace startup `log.Printf` with `lgr.Info`:**

            Line 95 currently reads:
            ```go
            log.Printf("GCP Eventarc Emulator v%s (REST)", version)
            ```
            Replace with:
            ```go
            lgr.Info("GCP Eventarc Emulator v%s (REST)", version)
            ```

            **Task 7 — Move "Ready" log after listener confirms serving:**

            Currently "Ready" is logged inside the HTTP gateway goroutine before
            `gw.Start` returns (lines 150-152):
            ```go
            go func() {
                lgr.Info("HTTP gateway listening at %s", httpAddr)
                lgr.Info("Ready to accept REST requests")
                if err := gw.Start(httpAddr); err != nil {
                    log.Fatalf("Failed to serve HTTP: %v", err)
                }
            }()
            ```

            The gRPC goroutine also logs its address inside the goroutine (line 133).
            Apply readyCh for gRPC, keep HTTP goroutine log for now but move "Ready"
            to after readyCh (gRPC confirmed up):

            1. Before the gRPC goroutine, add:
               ```go
               grpcReadyCh := make(chan struct{})
               ```

            2. Replace the gRPC goroutine:
               ```go
               go func() {
                   lgr.Info("gRPC backend listening at %v (internal)", lis.Addr())
                   if err := grpcSrv.Serve(lis); err != nil {
                       log.Fatalf("Failed to serve gRPC: %v", err)
                   }
               }()
               ```
               With:
               ```go
               go func() {
                   lgr.Info("gRPC backend listening at %v (internal)", lis.Addr())
                   close(grpcReadyCh)
                   if err := grpcSrv.Serve(lis); err != nil {
                       log.Fatalf("Failed to serve gRPC: %v", err)
                   }
               }()
               ```

            3. Remove the "Ready" line from inside the HTTP goroutine:
               ```go
               lgr.Info("Ready to accept REST requests")
               ```
               Leave the `lgr.Info("HTTP gateway listening at %s", httpAddr)` line in
               the goroutine (it fires when the goroutine starts, which is fine for
               a startup message).

            4. After both goroutines, add:
               ```go
               <-grpcReadyCh
               lgr.Info("Ready to accept REST requests")
               lgr.Info("REST: http://localhost:%d/v1/projects/my-project/locations/us-central1/triggers", *httpPort)
               ```

            ### `cmd/server-dual/main.go` — Task 6 only

            **Task 6 — Replace startup `log.Printf` with `lgr.Info`:**

            Line 95 currently reads:
            ```go
            log.Printf("GCP Eventarc Emulator v%s (gRPC + REST)", version)
            ```
            Replace with:
            ```go
            lgr.Info("GCP Eventarc Emulator v%s (gRPC + REST)", version)
            ```

            Task 7 is already correctly implemented in server-dual (it already uses
            readyCh at lines 131-161). No further changes needed.

            ### Verification Gate
            ```
            go build ./cmd/...
            go vet ./cmd/...
            ```
            There are no unit tests for the cmd packages; build and vet are the
            appropriate gates.

            ### Constraints
            - Keep ALL `log.Fatalf` calls unchanged — fatal errors must always print
              regardless of log level. Only replace `log.Printf` / `log.Println`
              startup banners with `lgr.Info` or `lgr.Warn` as appropriate.
            - Do not change `log.Println("Shutting down...")` and
              `log.Println("Server stopped")` at shutdown — these are low-frequency
              operational messages; leaving them as stdlib log is acceptable.
              If you want to convert them, use `lgr.Info` consistently.
            - The `lgr` variable is created after flag parsing in all three mains;
              do not add any `lgr.Info` calls before `lgr := logger.New(*logLevel)`.
            - Do not remove or reorder any functional code (listener creation, server
              creation, routing setup). Only modify log call sites and add readyCh.
          files: []
