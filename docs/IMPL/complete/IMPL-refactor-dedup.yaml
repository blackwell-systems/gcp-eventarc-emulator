pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            cloneProto generic panics on nil proto.Message input. The current per-type
            wrappers all check `if x == nil { return nil }` before calling proto.Clone.
            The generic version `proto.Clone(m).(T)` with a nil m may panic on the
            type assertion if proto.Clone returns a typed nil.
          likelihood: medium
          impact: high
          mitigation: |
            Agent A must test nil-safety of cloneProto before removing the per-type
            wrappers. If `proto.Clone(nil proto.Message).(T)` panics, add a reflect-based
            nil check: use a concrete nil pointer test via `reflect.ValueOf(m).IsNil()`.
            Alternatively, add a typed nil check using a zero-value comparison. The
            brief explicitly warns Agent A to test this.
        - scenario: |
            PaginatePage changes pagination error behavior. The current ListTriggers and
            ListProviders implementations silently ignore invalid pageTokens (they use
            `if n, err := strconv.Atoi(pageToken); err == nil` and fall through on error).
            PaginatePage returns an InvalidArgument error on bad tokens. This is a
            behavior change that could affect clients sending invalid page tokens.
          likelihood: low
          impact: medium
          mitigation: |
            This is an intentional improvement aligned with the GCP API spec. Tests that
            pass invalid tokens and expect empty results rather than errors would break.
            Review existing tests in internal/server/*_test.go for pagination with bad
            tokens before merging Agent A's changes. The test files are not in Agent A's
            ownership; human review of existing test behavior is needed post-merge.
        - scenario: |
            ListMessageBusEnrollments uses `[]string` not `[]proto.Message`. PaginatePage
            is generic over `any` so it works for strings, but Agent A must use the
            correct type instantiation. If Agent A accidentally wraps proto-specific
            logic inside PaginatePage, the string use case will break.
          likelihood: low
          impact: medium
          mitigation: |
            PaginatePage is defined as `[T any]` with no proto constraint, making it safe
            for `[]string`. Agent A's brief explicitly calls this out. Post-merge build
            will catch any type errors.
        - scenario: |
            authz.GetPermission returns (PermissionCheck, bool). If Agent B uses the
            panic-based `perm()` helper and a key is misspelled, it panics at runtime
            rather than compile time.
          likelihood: low
          impact: high
          mitigation: |
            Agent B's brief includes the full mapping table of raw string to authz key.
            The panic-based perm() helper surfaces typos in tests before production.
            Add a test that calls perm() for every RPC method if time permits. The
            authz_test.go already tests the map; Agent B should verify each key exists.
        - scenario: |
            cmd/server-dual/main.go already has log.Printf on line 95. Agent D replaces
            it. However, server-dual's readyCh implementation at lines 131-161 is already
            correct. If Agent D accidentally modifies the readyCh section thinking it is
            broken, it could introduce a regression.
          likelihood: low
          impact: medium
          mitigation: |
            Agent D's brief explicitly states that Task 7 is already done in server-dual
            and only Task 6 (the log.Printf replacement) is needed there. The brief
            says "No further changes needed" after describing the Task 7 work. The go
            build gate will catch any compilation errors.
        - scenario: |
            NormalizeTriggerResource may have callers in test files or in code not
            indexed by grep. Agent E's brief requires running grep first and aborting
            if any callers are found.
          likelihood: low
          impact: low
          mitigation: |
            The pre-removal grep check in Agent E's brief is mandatory. Scout already
            ran the check and found no callers, but Agent E re-verifies at execution time
            as a double-check. If callers appear (e.g., from a test file added between
            scout and execution), the agent aborts without modifying the file.
