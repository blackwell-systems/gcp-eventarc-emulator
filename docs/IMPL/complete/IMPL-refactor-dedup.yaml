            ## Agent B — Server Validation and IAM Constants (Tasks 4, 8)

            ### Context
            Your single file is `internal/server/server.go` (886 lines). It implements
            all gRPC RPC handlers. Two independent improvements are needed.

            ### Task 4: Add `requireField` helper and replace ~50 if-blocks

            Add the following unexported function near the top of server.go, after the
            `checkPermission` method (around line 100):

            ```go
            // requireField returns a gRPC InvalidArgument error when value is empty.
            // fieldName is used in the error message, e.g. "name is required".
            func requireField(value, fieldName string) error {
                if value == "" {
                    return status.Errorf(codes.InvalidArgument, "%s is required", fieldName)
                }
                return nil
            }
            ```

            Then replace every occurrence of the pattern:
            ```go
            if req.GetXxx() == "" {
                return nil, status.Error(codes.InvalidArgument, "xxx is required")
            }
            ```
            with:
            ```go
            if err := requireField(req.GetXxx(), "xxx"); err != nil {
                return nil, err
            }
            ```

            Also replace multi-field nil+empty patterns such as:
            ```go
            if req.GetTrigger() == nil || req.GetTrigger().GetName() == "" {
                return nil, status.Error(codes.InvalidArgument, "trigger.name is required")
            }
            ```
            with:
            ```go
            if err := requireField(req.GetTrigger().GetName(), "trigger.name"); err != nil {
                return nil, err
            }
            ```
            (proto getter methods on nil return the zero value, so `req.GetTrigger().GetName()`
            is safe even when trigger is nil — it returns "".)

            Do NOT use `requireField` for non-empty checks that return different error
            messages or have special logic. Only replace the standard
            `"<field> is required"` pattern.

            The following non-standard validations MUST be kept as-is (they have extra
            conditions or different error messages):
            - `req.GetParent() == ""` checks that are accompanied by additional validation
              (e.g., channel_id or trigger_id checks)  — keep each as individual
              `requireField` calls, one per field.
            - Any check that tests `req.GetXxx() == nil` where nil is distinct from empty
              string (e.g., `req.GetChannel() == nil`) — keep as-is unless the same block
              also checks `.GetName() == ""`, in which case use requireField on the Name.

            There are approximately 50 such if-blocks across the file. Replace all of them.

            ### Task 8: Replace hardcoded IAM permission strings with authz constants

            The `authz` package at `internal/authz/permissions.go` defines `GetPermission`
            which maps RPC operation names to their permission strings via a `permissionMap`.

            Add the authz import to server.go:
            ```go
            "github.com/blackwell-systems/gcp-eventarc-emulator/internal/authz"
            ```

            Then replace every `checkPermission` call that passes a raw string literal with
            a call that uses `authz.GetPermission`. The pattern is:

            Old:
            ```go
            if err := s.checkPermission(ctx, "eventarc.triggers.get", req.GetName()); err != nil {
            ```
            New:
            ```go
            if err := s.checkPermission(ctx, authz.GetPermission("GetTrigger").Permission, req.GetName()); err != nil {
            ```

            The mapping from RPC method to authz key is direct — the authz key matches the
            gRPC method name without package prefix. All ~40 checkPermission callsites use
            permission strings that are defined in `authz.permissionMap`. The mapping is:
            - "eventarc.triggers.get"                   → authz.GetPermission("GetTrigger").Permission
            - "eventarc.triggers.list"                  → authz.GetPermission("ListTriggers").Permission
            - "eventarc.triggers.create"                → authz.GetPermission("CreateTrigger").Permission
            - "eventarc.triggers.update"                → authz.GetPermission("UpdateTrigger").Permission
            - "eventarc.triggers.delete"                → authz.GetPermission("DeleteTrigger").Permission
            - "eventarc.providers.get"                  → authz.GetPermission("GetProvider").Permission
            - "eventarc.providers.list"                 → authz.GetPermission("ListProviders").Permission
            - "eventarc.channels.get"                   → authz.GetPermission("GetChannel").Permission
            - "eventarc.channels.list"                  → authz.GetPermission("ListChannels").Permission
            - "eventarc.channels.create"                → authz.GetPermission("CreateChannel").Permission
            - "eventarc.channels.update"                → authz.GetPermission("UpdateChannel").Permission
            - "eventarc.channels.delete"                → authz.GetPermission("DeleteChannel").Permission
            - "eventarc.channelConnections.get"         → authz.GetPermission("GetChannelConnection").Permission
            - "eventarc.channelConnections.list"        → authz.GetPermission("ListChannelConnections").Permission
            - "eventarc.channelConnections.create"      → authz.GetPermission("CreateChannelConnection").Permission
            - "eventarc.channelConnections.delete"      → authz.GetPermission("DeleteChannelConnection").Permission
            - "eventarc.googleChannelConfigs.get"       → authz.GetPermission("GetGoogleChannelConfig").Permission
            - "eventarc.googleChannelConfigs.update"    → authz.GetPermission("UpdateGoogleChannelConfig").Permission
            - "eventarc.messageBuses.get"               → authz.GetPermission("GetMessageBus").Permission
            - "eventarc.messageBuses.list"              → authz.GetPermission("ListMessageBuses").Permission
            - "eventarc.messageBuses.list" (ListMessageBusEnrollments) → authz.GetPermission("ListMessageBusEnrollments").Permission
            - "eventarc.messageBuses.create"            → authz.GetPermission("CreateMessageBus").Permission
            - "eventarc.messageBuses.update"            → authz.GetPermission("UpdateMessageBus").Permission
            - "eventarc.messageBuses.delete"            → authz.GetPermission("DeleteMessageBus").Permission
            - "eventarc.enrollments.get"                → authz.GetPermission("GetEnrollment").Permission
            - "eventarc.enrollments.list"               → authz.GetPermission("ListEnrollments").Permission
            - "eventarc.enrollments.create"             → authz.GetPermission("CreateEnrollment").Permission
            - "eventarc.enrollments.update"             → authz.GetPermission("UpdateEnrollment").Permission
            - "eventarc.enrollments.delete"             → authz.GetPermission("DeleteEnrollment").Permission
            - "eventarc.pipelines.get"                  → authz.GetPermission("GetPipeline").Permission
            - "eventarc.pipelines.list"                 → authz.GetPermission("ListPipelines").Permission
            - "eventarc.pipelines.create"               → authz.GetPermission("CreatePipeline").Permission
            - "eventarc.pipelines.update"               → authz.GetPermission("UpdatePipeline").Permission
            - "eventarc.pipelines.delete"               → authz.GetPermission("DeletePipeline").Permission
            - "eventarc.googleApiSources.get"           → authz.GetPermission("GetGoogleApiSource").Permission
            - "eventarc.googleApiSources.list"          → authz.GetPermission("ListGoogleApiSources").Permission
            - "eventarc.googleApiSources.create"        → authz.GetPermission("CreateGoogleApiSource").Permission
            - "eventarc.googleApiSources.update"        → authz.GetPermission("UpdateGoogleApiSource").Permission
            - "eventarc.googleApiSources.delete"        → authz.GetPermission("DeleteGoogleApiSource").Permission

            Note: `authz.GetPermission` returns `(PermissionCheck, bool)`. Since all keys
            above are statically known to be in the map, you may call it as:
            ```go
            perm, _ := authz.GetPermission("GetTrigger")
            // then use perm.Permission
            ```
            Or inline: `func() string { p, _ := authz.GetPermission("GetTrigger"); return p.Permission }()`

            A cleaner approach: define a small unexported helper at the top of server.go:
            ```go
            // perm returns the IAM permission string for the named Eventarc operation.
            // It panics if the operation is not registered in the authz package, which
            // indicates a programming error (missing permission constant).
            func perm(operation string) string {
                p, ok := authz.GetPermission(operation)
                if !ok {
                    panic("authz: unknown operation: " + operation)
                }
                return p.Permission
            }
            ```
            Then all callsites become:
            ```go
            if err := s.checkPermission(ctx, perm("GetTrigger"), req.GetName()); err != nil {
            ```
            This is the recommended approach — clean, verifiable, fails fast on typos.

            ### Verification Gate
            ```
