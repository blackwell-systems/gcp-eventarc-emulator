            ## Agent C — Logger OrDefault Helper (Task 5)

            ### Context
            Three packages each guard against nil logger with the same inline pattern.
            The fix requires adding one helper to the logger package, then updating
            the three consumer packages to use it.

            ### Step 1: Add `OrDefault` to `internal/logger/logger.go`

            Add the following exported function to `internal/logger/logger.go`, at the
            end of the file after the `Error` method:

            ```go
            // OrDefault returns lgr if it is non-nil, or a new Logger at info level.
            // Use this to consolidate the nil-logger guard pattern at package boundaries.
            func OrDefault(lgr *Logger) *Logger {
                if lgr != nil {
                    return lgr
                }
                return New("info")
            }
            ```

            No other changes to logger.go are needed.

            ### Step 2: Update `internal/router/router.go`

            Find `NewRouter`:
            ```go
            func NewRouter(storage StorageReader, log ...*logger.Logger) *Router {
                r := &Router{storage: storage}
                if len(log) > 0 && log[0] != nil {
                    r.logger = log[0]
                } else {
                    r.logger = logger.New("info")
                }
                return r
            }
            ```

            Replace the nil-guard block with `logger.OrDefault`:
