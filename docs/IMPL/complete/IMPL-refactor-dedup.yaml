interface_contracts:
    - name: PaginatePage
      description: |
        Generic pagination helper that slices a sorted items slice using
        integer-offset page tokens. Replaces the duplicated pagination block in
        all nine List* storage methods. Returns the page slice, next token, and
        an error if the page token is invalid.
      definition: |
        // PaginatePage slices items into a page using integer-offset tokens.
        // pageToken is an integer string offset; empty string means start from 0.
        // pageSize is clamped to the range [1, 100]; 0 or negative uses 100.
        // Returns (page, nextToken, err). nextToken is "" on the last page.
        func PaginatePage[T any](items []T, pageToken string, pageSize int32) ([]T, string, error)
      location: internal/server/storage_helpers.go
    - name: cloneProto
      description: |
        Generic single-line proto clone helper replacing 8 per-type clone
        wrappers. Accepts any proto.Message and returns the same concrete type.
        cloneProvider is NOT replaced because it also rewrites the Name field
        and must remain as a dedicated function in storage.go.
      definition: |
        // cloneProto returns a deep copy of any proto.Message using proto.Clone.
        // The returned value is the same concrete type as the input.
        // Returns nil if m is the zero value of T (nil pointer).
        func cloneProto[T proto.Message](m T) T
      location: internal/server/storage_helpers.go
    - name: newUID
      description: |
        Returns a random 64-bit hex string suitable for use as a resource UID.
        Replaces all occurrences of `fmt.Sprintf("%x", rand.Uint64())` used
        for UID assignment.
      definition: |
        func newUID() string
      location: internal/server/storage_helpers.go
    - name: newEtag
      description: |
        Returns a random 64-bit hex string suitable for use as a resource etag.
        Identical implementation to newUID but semantically distinct; replaces all
        occurrences of `fmt.Sprintf("%x", rand.Uint64())` used for etag assignment.
      definition: |
        func newEtag() string
      location: internal/server/storage_helpers.go
    - name: requireField
      description: |
        Validation helper that returns an InvalidArgument gRPC status error if
        value is the empty string. Replaces the ~50 repeated if-blocks in
        internal/server/server.go.
      definition: |
        // requireField returns a gRPC InvalidArgument error if value == "".
        // fieldName is used in the error message: "<fieldName> is required".
        func requireField(value, fieldName string) error
      location: internal/server/server.go
    - name: OrDefault
      description: |
        Returns lgr if non-nil, otherwise returns a new info-level Logger.
        Replaces the three inline nil-guard patterns in router, dispatcher,
        and publisher packages.
      definition: |
        // OrDefault returns lgr if it is non-nil, or a new info-level Logger.
        func OrDefault(lgr *Logger) *Logger
      location: internal/logger/logger.go
