            Before writing any code, Wave 1 Agent A must run:
            `go get cloud.google.com/go/eventarc/apiv1` and inspect
            the generated package to confirm the import path, service
            interface name (EventarcServer), and registration function.
            All subsequent agents depend on this being correct.
        - scenario: longrunning proto import path mismatch
          likelihood: medium
          impact: medium
          mitigation: |
            Wave 1 Agent C must verify the longrunning package path after
            `go mod tidy`. Try `cloud.google.com/go/longrunning/autogen/longrunningpb`
            first; if missing, try `cloud.google.com/go/longrunning/autogen/longrunningpb`.
            Document the correct path in a comment at the top of store.go.
        - scenario: circular import between router and server packages
          likelihood: medium
          impact: medium
          mitigation: |
            Wave 3 Agent A uses a StorageReader interface to avoid importing
            server package. Wave 3 Agent C uses RouterMatcher and EventDispatcher
            interfaces in the intake package. Both are specified in the interface
            contracts — agents must follow them exactly.
        - scenario: CloudEvent binary format header parsing ambiguity
          likelihood: low
          impact: low
          mitigation: |
            Wave 3 Agent C should handle both `ce-type` and `Ce-Type` header
            casing (use http.Header.Get which is case-insensitive).
            Minimum viable: just support `type` (structured) and `ce-type` (binary).
        - scenario: buf-generated gateway types conflict with cloud.google.com/go/eventarc types
          likelihood: high
          impact: high
          mitigation: |
            Wave 4 Agent A must verify type compatibility before Wave 4 Agent B
            writes any gateway code. If buf generates duplicate proto types that
            don't match cloud.google.com/go/eventarc/apiv1/eventarcpb, use the
            RegisterEventarcHandlerClient fallback (takes a gRPC client, not an
            endpoint string) with a local insecure client. This sidesteps the
            type conflict entirely — the client uses cloud.google.com/go types
            and the gateway just forwards HTTP to it.
            Wave 4 Agent A must document the resolution in a comment at the top
            of internal/gateway/gateway.go before Agent B starts.
        - scenario: Publishing proto package (publishingpb) may not exist as separate Go module
          likelihood: medium
          impact: medium
          mitigation: |
            Wave 3 Agent C must run `go get cloud.google.com/go/eventarc/publishing/apiv1`
            and verify the package exists before coding. If publishingpb is not a
            separate module, the Publisher service can be implemented as an HTTP-only
            endpoint (POST /events) and the gRPC Publisher can be deferred. The
            fallback is clearly stated in the Agent C constraints.
        - scenario: Provider resource seeding is too simplistic for real client use
          likelihood: low
          impact: low
          mitigation: |
            The static provider list covers common test scenarios. If the real
            client queries for a specific provider not in the list, return NotFound
            rather than panicking. Extend the list incrementally as needed.
