          task: |
            ## Wave 3 Agent B — HTTP Dispatcher

            HTTP POST a CloudEvent (as JSON) to a trigger's destination URL.

            ### Dispatcher
            ```go
            package dispatcher

            import cloudevents "github.com/cloudevents/sdk-go/v2"

            type Dispatcher struct {
                client *http.Client
            }

            func NewDispatcher(client *http.Client) *Dispatcher
            // If client is nil, use http.DefaultClient with 10s timeout.

            func (d *Dispatcher) Dispatch(ctx context.Context, trigger *eventarcpb.Trigger, event cloudevents.Event) (int, error)
            ```

            ### Dispatch logic
            1. Extract destination URL from trigger:
               - If `trigger.Destination.GetHttpEndpoint() != nil`:
                 use `trigger.Destination.GetHttpEndpoint().GetUri()`
               - If `trigger.Destination.GetCloudRun() != nil`:
                 construct URL as `{EVENTARC_CLOUDRUN_BASE_URL}/{path}` where
                 EVENTARC_CLOUDRUN_BASE_URL defaults to `http://localhost` and
                 path comes from `trigger.Destination.GetCloudRun().GetPath()`
                 (default path: "/")
               - Otherwise: return error "unsupported destination type"
            2. Marshal event to JSON: `body, err := json.Marshal(event)`
            3. POST body to URL with `Content-Type: application/cloudevents+json`.
            4. Return HTTP status code and any transport error.
            5. Log: "dispatching event to {url}, status: {code}"

            ### Tests (http_test.go)
            Use `httptest.NewServer` to capture dispatch calls.
            Build test events with the SDK:
            ```go
            e := cloudevents.NewEvent()
            e.SetType("google.cloud.pubsub.topic.v1.messagePublished")
            e.SetSource("//pubsub.googleapis.com/projects/p/topics/t")
            e.SetID("test-id")
            ```
            - TestDispatch_HttpEndpoint_Success — verify POST reaches test server with correct body
            - TestDispatch_HttpEndpoint_Returns404 — non-2xx is not an error (just returned)
            - TestDispatch_CloudRunDestination_UsesBaseURL
            - TestDispatch_UnsupportedDestination_ReturnsError
            - TestDispatch_ContentType_IsCloudEventsJSON

