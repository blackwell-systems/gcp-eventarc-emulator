            go vet ./internal/dispatcher/...
            go test ./internal/dispatcher/... -v
            ```

            ### Constraints
            - Non-2xx HTTP responses from destination are NOT dispatcher errors —
              return the status code, let the caller decide.
            - EVENTARC_CLOUDRUN_BASE_URL env var for Cloud Run URL mapping.
            - Do NOT implement retries (that is a future concern).
            - Timeout: use 10s default on http.Client if nil is passed.
