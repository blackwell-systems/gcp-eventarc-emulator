title: GCP Eventarc Emulator — Initial Implementation
feature_slug: eventarc-emulator
verdict: SUITABLE
suitability_assessment: |
    SUITABLE. Greenfield Go project bootstrapped from the established
    gcp-secret-manager-emulator pattern. Decomposes into 4 waves with
    disjoint file ownership across 12 agents.

    Scope: config plane (Trigger/Provider CRUD) + immediate LRO resolution
    + CloudEvent routing to HTTP destinations + full REST gateway via
    grpc-gateway. Advanced resources (Channels, MessageBuses, Pipelines,
    Enrollments) are out of scope.

    REST gateway approach: Option B — keep cloud.google.com/go/eventarc/apiv1/eventarcpb
    for gRPC server types; use buf to generate ONLY the grpc-gateway handler
    registration code (*.pb.gw.go) against the same proto source.
    grpc-gateway: github.com/grpc-ecosystem/grpc-gateway/v2

    Wave 1 (Foundation — fully parallel, no deps):
      - Agent A: project scaffolding (go.mod, cmd/server/main.go, Makefile + proto target)
      - Agent B: in-memory storage (internal/server/storage.go + test)
      - Agent C: LRO store (internal/lro/store.go + test, implements OperationsServer)

    Wave 2 (Server layer — depends on Wave 1 interfaces):
      - Agent A: IAM authz map (internal/authz/permissions.go + test)
      - Agent B: gRPC service impl (internal/server/server.go + test)
        Exports NewGRPCServer() helper for reuse across cmd entrypoints.

    Wave 3 (Event routing — depends on Wave 2):
      - Agent A: CloudEvent router (internal/router/router.go + test)
      - Agent B: HTTP dispatcher (internal/dispatcher/http.go + test)
      - Agent C: Publisher gRPC service + wire-up (internal/publisher/server.go,
        update cmd/server/main.go via NewGRPCServer())
      - Agent D: bufconn integration tests (integration_test.go at root)

    Wave 4 (REST gateway — depends on Wave 2, parallel with Wave 3):
      - Agent A: buf proto generation setup (buf.yaml, buf.gen.yaml, internal/gen/)
        Generates grpc-gateway handler registration code only.
      - Agent B: REST gateway (internal/gateway/gateway.go)
        grpc-gateway runtime.NewServeMux() + generated RegisterEventarcHandlerFromEndpoint.
      - Agent C: REST/dual cmd entrypoints (cmd/server-rest/main.go, cmd/server-dual/main.go)

    Parallelization value: High. Wave 4 can run in parallel with Wave 3 since
    it only depends on Wave 2 (the gRPC server interface), not on routing/publishing.

    Estimated times:
    - Wave 1: ~6 min (3 parallel agents)
    - Wave 2: ~8 min (2 parallel agents)
    - Wave 3+4: ~10 min (7 parallel agents across both waves simultaneously)
    Total: ~24 min (vs ~65 min sequential)
