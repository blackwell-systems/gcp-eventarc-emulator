            ## Wave 4 Agent B — REST Gateway

            Implement the HTTP/JSON REST gateway using grpc-gateway runtime.
            The gateway proxies all REST calls to the local gRPC server.

            ### internal/gateway/gateway.go
            ```go
            package gateway

            import (
                "github.com/grpc-ecosystem/grpc-gateway/v2/runtime"
                "google.golang.org/grpc"
                "google.golang.org/grpc/credentials/insecure"
                gw "github.com/blackwell-systems/gcp-eventarc-emulator/internal/gen/google/cloud/eventarc/v1"
                pubgw "github.com/blackwell-systems/gcp-eventarc-emulator/internal/gen/google/cloud/eventarc/publishing/v1"
            )

            type Gateway struct {
                mux        *runtime.ServeMux
                httpServer *http.Server
                conn       *grpc.ClientConn
            }

            func New(grpcAddr string) (*Gateway, error)
            func (g *Gateway) Start(httpAddr string) error
            func (g *Gateway) Stop(ctx context.Context) error
            ```

            ### Implementation
            ```go
            func New(grpcAddr string) (*Gateway, error) {
                mux := runtime.NewServeMux(
                    runtime.WithMarshalerOption(runtime.MIMEWildcard, &runtime.JSONPb{
                        MarshalOptions:   protojson.MarshalOptions{EmitUnpopulated: true, UseProtoNames: true},
                        UnmarshalOptions: protojson.UnmarshalOptions{DiscardUnknown: true},
                    }),
                )
                opts := []grpc.DialOption{grpc.WithTransportCredentials(insecure.NewCredentials())}
                ctx := context.Background()

                if err := gw.RegisterEventarcHandlerFromEndpoint(ctx, mux, grpcAddr, opts); err != nil {
                    return nil, err
                }
                if err := pubgw.RegisterPublisherHandlerFromEndpoint(ctx, mux, grpcAddr, opts); err != nil {
                    return nil, err
                }

                // Health endpoint — HandlePath returns an error, must be checked
                if err := mux.HandlePath("GET", "/health", func(w http.ResponseWriter, r *http.Request, _ map[string]string) {
                    w.Header().Set("Content-Type", "application/json")
                    w.Write([]byte(`{"status":"healthy"}`))
                }); err != nil {
                    return nil, fmt.Errorf("register health handler: %w", err)
                }

                return &Gateway{mux: mux}, nil
            }
            ```

            ### Tests (gateway_test.go)
