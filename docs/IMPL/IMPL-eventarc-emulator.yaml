interface_contracts:
    - name: Storage
      description: |
        In-memory store for Trigger and Provider resources.
        Implemented in internal/server/storage.go (Wave 1 Agent B).
        Consumed by internal/server/server.go (Wave 2 Agent B) and
        internal/router/router.go (Wave 3 Agent A).
      definition: |
        // Storage is the in-memory store for Eventarc resources.
        // All methods are thread-safe (sync.RWMutex internally).
        type Storage struct { /* private */ }

        func NewStorage() *Storage

        // Triggers
        func (s *Storage) CreateTrigger(ctx context.Context, parent, triggerID string, trigger *eventarcpb.Trigger) (*eventarcpb.Trigger, error)
        func (s *Storage) GetTrigger(ctx context.Context, name string) (*eventarcpb.Trigger, error)
        func (s *Storage) UpdateTrigger(ctx context.Context, trigger *eventarcpb.Trigger, updateMask *fieldmaskpb.FieldMask) (*eventarcpb.Trigger, error)
        func (s *Storage) DeleteTrigger(ctx context.Context, name string) error
        func (s *Storage) ListTriggers(ctx context.Context, parent string, pageSize int32, pageToken string, orderBy string, filter string) ([]*eventarcpb.Trigger, string, error)

        // Providers (static, seeded at startup)
        func (s *Storage) GetProvider(ctx context.Context, name string) (*eventarcpb.Provider, error)
        func (s *Storage) ListProviders(ctx context.Context, parent string, pageSize int32, pageToken string, filter string, orderBy string) ([]*eventarcpb.Provider, string, error)

        // For router: return all triggers in a location
        func (s *Storage) ListAllTriggers(ctx context.Context, parent string) ([]*eventarcpb.Trigger, error)

        // For testing
        func (s *Storage) Clear()
        func (s *Storage) TriggerCount() int
      location: internal/server/storage.go
    - name: LROStore
      description: |
        Long-running operation store. Resolves operations immediately (DONE)
        for local dev ergonomics — no async polling needed.
        Implemented in internal/lro/store.go (Wave 1 Agent C).
        Consumed by internal/server/server.go (Wave 2 Agent B).

        IMPORTANT: Store must also implement longrunningpb.OperationsServer so it
        can be registered directly on the gRPC server alongside EventarcServer.
        Callers using the Go client's lro.WaitOperation / GetOperation will hit
        this service. Registration in main.go:
          longrunningpb.RegisterOperationsServer(grpcServer, lroStore)
      definition: |
        // Store manages long-running operations and implements OperationsServer.
        // In emulator mode all operations complete immediately (Done: true).
        type Store struct {
            longrunningpb.UnimplementedOperationsServer
            /* private fields */
        }

        func NewStore() *Store

        // CreateDone creates a pre-resolved operation with the given resource as response.
        // name format: "projects/{project}/locations/{location}/operations/{uuid}"
        func (s *Store) CreateDone(parent string, resource proto.Message) (*longrunningpb.Operation, error)

        // OperationsServer interface (registered on gRPC server):
        func (s *Store) GetOperation(ctx context.Context, req *longrunningpb.GetOperationRequest) (*longrunningpb.Operation, error)
        func (s *Store) DeleteOperation(ctx context.Context, req *longrunningpb.DeleteOperationRequest) (*emptypb.Empty, error)
        func (s *Store) CancelOperation(ctx context.Context, req *longrunningpb.CancelOperationRequest) (*emptypb.Empty, error)
        func (s *Store) ListOperations(ctx context.Context, req *longrunningpb.ListOperationsRequest) (*longrunningpb.ListOperationsResponse, error)
        // WaitOperation: delegates to GetOperation (already done, returns immediately)
        func (s *Store) WaitOperation(ctx context.Context, req *longrunningpb.WaitOperationRequest) (*longrunningpb.Operation, error)
      location: internal/lro/store.go
    - name: NewGRPCServer
      description: |
        Shared gRPC server factory used by all cmd entrypoints (server, server-rest,
        server-dual). Registers all three services and reflection. Eliminates
        copy-paste across cmd packages.
        Implemented in internal/server/grpc.go (Wave 2 Agent B).
        Consumed by cmd/server/main.go (Wave 3 Agent C), cmd/server-rest/main.go
        and cmd/server-dual/main.go (Wave 4 Agent C).
      definition: |
        package server

        // PublisherRegistrar is the subset of publishingpb.PublisherServer needed
        // for registration. Defined here to avoid import cycle server→publisher→server.
        type PublisherRegistrar interface {
            publishingpb.PublisherServer
        }

        // NewGRPCServer creates a grpc.Server with all Eventarc services registered:
        //   - eventarcpb.EventarcServer (Trigger/Provider CRUD)
        //   - longrunningpb.OperationsServer (LRO polling)
        //   - publishingpb.PublisherServer (event publishing)
        //   - grpc/reflection (for grpc_cli debugging)
        func NewGRPCServer(srv *Server, pub PublisherRegistrar) *grpc.Server {
            grpcSrv := grpc.NewServer()
            eventarcpb.RegisterEventarcServer(grpcSrv, srv)
            longrunningpb.RegisterOperationsServer(grpcSrv, srv.LROStore())
            publishingpb.RegisterPublisherServer(grpcSrv, pub)
            reflection.Register(grpcSrv)
            return grpcSrv
        }
      location: internal/server/grpc.go
    - name: Router
      description: |
        Matches an incoming CloudEvent against stored triggers.
        Returns the list of triggers whose event_filters all match.
        Implemented in internal/router/router.go (Wave 3 Agent A).
        Consumed by internal/publisher/server.go (Wave 3 Agent C).
        Uses github.com/cloudevents/sdk-go/v2 for the Event type.
      definition: |
        import cloudevents "github.com/cloudevents/sdk-go/v2"

        // Router matches CloudEvents against Eventarc triggers.
        type Router struct { /* private */ }

        func NewRouter(storage StorageReader) *Router

        // Match returns all triggers in the given project/location whose
        // event_filters all match the provided CloudEvent.
        // Attributes are read from event.Type(), event.Source(), event.Subject(),
        // and event.Extensions() for custom attributes.
        func (r *Router) Match(ctx context.Context, parent string, event cloudevents.Event) ([]*eventarcpb.Trigger, error)

        // attrValue extracts a named attribute from a CloudEvent.
        // Checks standard attributes (type, source, subject, id, datacontenttype)
        // then falls back to Extensions().
        func attrValue(event cloudevents.Event, attr string) string
      location: internal/router/router.go
    - name: Dispatcher
      description: |
        HTTP dispatcher — POSTs a CloudEvent to the destination URL extracted
        from a trigger's http_endpoint or cloud_run destination.
        Implemented in internal/dispatcher/http.go (Wave 3 Agent B).
        Consumed by internal/publisher/server.go (Wave 3 Agent C).
        Uses github.com/cloudevents/sdk-go/v2 for marshaling.
      definition: |
        import cloudevents "github.com/cloudevents/sdk-go/v2"

        // Dispatcher sends CloudEvents to trigger destinations via HTTP.
        type Dispatcher struct { /* private */ }

        func NewDispatcher(httpClient *http.Client) *Dispatcher

        // Dispatch POSTs the CloudEvent (JSON-marshaled via sdk-go) to the
        // trigger's destination URL with Content-Type: application/cloudevents+json.
        // Returns the HTTP response status and any transport error.
        // trigger.Destination must have HttpEndpoint.Uri set; Cloud Run destinations
        // are supported by mapping service URL from the trigger's cloud_run.service field
        // using EVENTARC_CLOUDRUN_BASE_URL env var (default: http://localhost).
        func (d *Dispatcher) Dispatch(ctx context.Context, trigger *eventarcpb.Trigger, event cloudevents.Event) (int, error)
      location: internal/dispatcher/http.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Wave 1 Agent A — Project Scaffolding

            Bootstrap the Go module and server entrypoint. Follow the exact
            patterns from gcp-secret-manager-emulator.

            ### Files to create

            **go.mod**
            ```
            module github.com/blackwell-systems/gcp-eventarc-emulator

            go 1.24.0

            require (
                cloud.google.com/go/eventarc v1.18.0
                github.com/blackwell-systems/gcp-emulator-auth v0.3.0
                github.com/cloudevents/sdk-go/v2 v2.15.2
                cloud.google.com/go/longrunning v0.6.0
                google.golang.org/grpc v1.78.0
                google.golang.org/protobuf v1.36.11
            )
            ```
            Run `go mod tidy` to populate go.sum and indirect deps.

            **cmd/server/main.go**
            Mirror gcp-secret-manager-emulator/cmd/server/main.go exactly:
            - Package doc with Usage + Environment Variables
            - `--port` flag, default 9085 (Eventarc port convention)
            - Env vars: `EVENTARC_EMULATOR_HOST` (port part), `GCP_MOCK_LOG_LEVEL`
            - Create gRPC server, register EventarcServer + OperationsServer, register reflection
            - Graceful shutdown on SIGINT/SIGTERM
            - Log: "GCP Eventarc Emulator v{version}"
            - Do NOT add HTTP intake listener yet — Wave 3 Agent C will add it.
            - Use server.NewGRPCServer() to register all services — do NOT inline
              service registration. Wave 3 Agent C adds the publisher and calls
              NewGRPCServer; Wave 1 Agent A creates a stub that will compile once
              Wave 2 is complete. For Wave 1, just create the server struct:
              ```go
              srv, err := server.NewServer()
              // NewGRPCServer wired by Wave 3 Agent C once publisher exists
              grpcServer := grpc.NewServer()
              eventarcpb.RegisterEventarcServer(grpcServer, srv)
              reflection.Register(grpcServer)
              ```
              Wave 3 Agent C will update this to use server.NewGRPCServer(srv, pub).
            - `server.NewServer()` comes from `github.com/blackwell-systems/gcp-eventarc-emulator/internal/server`

            **Makefile**
            ```makefile
            .PHONY: build test lint clean

            build:
                go build ./...

            test:
                go test ./...

            lint:
                go vet ./...

            clean:
                rm -f gcp-eventarc-emulator
            ```

            **.gitignore**
            ```
            gcp-eventarc-emulator
            *.test
            .env
            ```

            ### Verification gate
            ```bash
            go mod tidy
            go build ./...
            go vet ./...
            ```
            Note: `go build ./...` may fail if Wave 1 B/C packages are not yet
            present. That is expected — the entrypoint imports them. Verify at
            minimum that go.mod is valid and the cmd/server package compiles
            in isolation (comment out internal imports temporarily if needed,
            or just verify go.mod + go.sum are correct and go vet passes on
            cmd/server/main.go once sibling agents complete).

            ### Constraints
            - Use port 9085 as default (matches EVENTARC_EMULATOR_HOST convention).
            - Keep env var pattern consistent: `EVENTARC_EMULATOR_HOST` contains
              "host:port" (e.g. "localhost:9085") matching the real GCP emulator
              env var name used by the Go client.
            - Do NOT implement server logic here — just wire up the registered server.
          files:
            - go.mod
            - go.sum
            - cmd/server/main.go
            - Makefile
            - .gitignore
        - id: B
          task: |
            ## Wave 1 Agent B — In-Memory Storage

            Implement the in-memory storage layer for Trigger and Provider
            resources. Follow the exact pattern from
            gcp-secret-manager-emulator/internal/server/storage.go.

            ### Storage struct
            ```go
            package server

            type Storage struct {
                mu        sync.RWMutex
                triggers  map[string]*eventarcpb.Trigger  // key: full resource name
                providers map[string]*eventarcpb.Provider // key: full resource name, seeded at init
            }
            ```

            ### Methods to implement
            See interface contract `Storage` in the IMPL doc for full signatures.

            **Triggers:**
            - `CreateTrigger` — validate name uniqueness, set create_time/update_time,
              generate uid (use `fmt.Sprintf("%x", rand.Uint64())`), return AlreadyExists
              if duplicate.
            - `GetTrigger` — return NotFound if missing.
            - `UpdateTrigger` — apply update_mask fields (labels, destination, event_filters,
              service_account, channel). Set update_time. Return NotFound if missing.
            - `DeleteTrigger` — return NotFound if missing.
            - `ListTriggers` — filter by parent prefix, sort by name, paginate with
              integer offset token (same pattern as secret manager). Support orderBy
              "name" and "create_time desc". Filter param: parse simple "trigger_id=X"
              style; if unparseable, ignore.
            - `ListAllTriggers` — return all triggers under parent, no pagination
              (used by router).

            **Providers (static seed):**
            Seed a small set of well-known providers at `NewStorage()` time:
            ```go
            var defaultProviders = []struct{ name, displayName string }{
                {"pubsub.googleapis.com", "Cloud Pub/Sub"},
                {"storage.googleapis.com", "Cloud Storage"},
                {"run.googleapis.com", "Cloud Run"},
                {"cloudfunctions.googleapis.com", "Cloud Functions"},
                {"cloudscheduler.googleapis.com", "Cloud Scheduler"},
            }
            ```
            Provider resource name pattern:
            `projects/{project}/locations/{location}/providers/{provider-id}`
            Seed with a synthetic project "projects/-/locations/-/providers/{id}"
            and match by provider ID suffix when GetProvider/ListProviders is called.
            (Simpler alternative: on first GetProvider/ListProviders call, create
            provider entries for the requested parent on the fly.)

            ### Tests (storage_test.go)
            - TestCreateTrigger_Success
            - TestCreateTrigger_AlreadyExists
            - TestGetTrigger_NotFound
            - TestDeleteTrigger_NotFound
            - TestListTriggers_Pagination
            - TestListProviders_ReturnsDefaults

            ### Verification gate
            ```bash
            go build ./internal/server/...
            go vet ./internal/server/...
            go test ./internal/server/... -run TestStorage -v
            ```

            ### Constraints
            - Import eventarcpb from `cloud.google.com/go/eventarc/apiv1/eventarcpb`.
            - Use `google.golang.org/protobuf/types/known/timestamppb` for timestamps.
            - Use `google.golang.org/protobuf/types/known/fieldmaskpb` for update masks.
            - Do NOT implement server.go here — only storage.
            - Provider seeding strategy: on-demand per parent is fine for MVP.
          files:
            - internal/server/storage.go
            - internal/server/storage_test.go
        - id: C
          task: |
            ## Wave 1 Agent C — LRO Store

            Implement the long-running operation store. In this emulator all
            operations resolve immediately (DONE state) — no async polling.

            ### LRO store
            ```go
            package lro

            import (
                longrunningpb "cloud.google.com/go/longrunning/autogen/longrunningpb"
                // verify path after go mod tidy; alt: cloud.google.com/go/longrunning/autogen/longrunningpb
                "google.golang.org/protobuf/types/known/anypb"
                "google.golang.org/protobuf/types/known/emptypb"
            )

            // Store manages long-running operations AND implements OperationsServer
            // so it can be registered directly on the gRPC server.
            // Callers using the Go LRO client (lro.WaitOperation, GetOperation) will
            // call this service endpoint.
            type Store struct {
                longrunningpb.UnimplementedOperationsServer
                mu  sync.RWMutex
                ops map[string]*longrunningpb.Operation // key: operation name
            }
            ```

            ### Methods to implement
            See interface contract `LROStore` in the IMPL doc for full signatures.

            **CreateDone (internal helper, not gRPC):**
            1. Generate operation name:
               `{parent}/operations/{uuid}` where uuid = random hex string
            2. Pack `resource` into `anypb.Any`
            3. Build `&longrunningpb.Operation{Name: name, Done: true,
               Result: &longrunningpb.Operation_Response{Response: anyVal}}`
            4. Store in map and return.

            **OperationsServer interface (gRPC-registered methods):**
            - `GetOperation(ctx, *GetOperationRequest) (*Operation, error)`
              → look up by req.Name, return NotFound if missing
            - `DeleteOperation(ctx, *DeleteOperationRequest) (*emptypb.Empty, error)`
              → remove from map, NotFound if missing
            - `CancelOperation(ctx, *CancelOperationRequest) (*emptypb.Empty, error)`
              → no-op (already done), return nil
            - `ListOperations(ctx, *ListOperationsRequest) (*ListOperationsResponse, error)`
              → filter ops by req.Name prefix, return paginated list
            - `WaitOperation(ctx, *WaitOperationRequest) (*Operation, error)`
              → delegate to GetOperation (already done, returns immediately)

            ### Package import path
            After `go mod tidy`, verify the longrunning package path.
            Try `cloud.google.com/go/longrunning/autogen/longrunningpb` first.
            If the type is `longrunning.Operation` (no pb suffix), alias:
            `longrunningpb "cloud.google.com/go/longrunning/autogen/longrunningpb"`
            Document the resolved path in a comment at the top of store.go.

            ### Tests (store_test.go)
            - TestCreateDone_ReturnsImmediatelyDone
            - TestCreateDone_ResponseUnpackable
            - TestGetOperation_NotFound
            - TestDeleteOperation_NotFound
            - TestCancelOperation_NoOp
            - TestWaitOperation_ReturnsImmediately
            - TestListOperations_FiltersByPrefix

            ### Verification gate
            ```bash
            go build ./internal/lro/...
            go vet ./internal/lro/...
            go test ./internal/lro/... -v
            ```

            ### Constraints
            - Operations MUST have Done: true immediately.
            - Operation name must embed the parent resource path for traceability.
            - Do NOT implement async background goroutines.
          files:
            - internal/lro/store.go
            - internal/lro/store_test.go
