            - Gateway connects to gRPC server via insecure loopback — no TLS.
            - If generated handler types conflict with cloud.google.com/go types,
              use RegisterEventarcHandlerClient with a local client instead of
              RegisterEventarcHandlerFromEndpoint (see Wave 4 Agent A fallback note).
