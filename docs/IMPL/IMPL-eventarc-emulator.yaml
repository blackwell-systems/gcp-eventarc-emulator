      agents:
        - id: A
          task: |
            ## Wave 3 Agent A — CloudEvent Router

            Match incoming CloudEvents against stored Eventarc triggers using
            the trigger's event_filters.

            ### Router
            ```go
            package router

            import cloudevents "github.com/cloudevents/sdk-go/v2"

            type Router struct {
                storage StorageReader
            }

            // StorageReader is the subset of *server.Storage needed by the router.
            // Define as interface to avoid circular imports.
            type StorageReader interface {
                ListAllTriggers(ctx context.Context, parent string) ([]*eventarcpb.Trigger, error)
            }

            func NewRouter(storage StorageReader) *Router

            func (r *Router) Match(ctx context.Context, parent string, event cloudevents.Event) ([]*eventarcpb.Trigger, error)

            // attrValue extracts a named CloudEvents attribute from the event.
            // Checks: "type", "source", "subject", "id", "datacontenttype" as standard attrs.
            // Falls back to event.Extensions()[attr] for custom attributes.
            func attrValue(event cloudevents.Event, attr string) string
            ```

            ### Matching logic
            Eventarc event_filters is a list of `EventFilter{Attribute, Value, Operator}`.
            A trigger matches if ALL filters match the event attributes.

            Operators:
            - `""` (empty) or `"match-path-pattern"` — exact string match for now
              (path pattern syntax is complex; exact match covers 90% of real use).
            - Future: `"match-path-pattern"` can be upgraded to glob/prefix matching.

            Algorithm:
            ```
            for each trigger in ListAllTriggers(parent):
                matched = true
                for each filter in trigger.EventFilters:
                    eventVal = attrValue(event, filter.Attribute)
                    if eventVal != filter.Value:
                        matched = false; break
                if matched: append to results
            ```

            ### Tests (router_test.go)
            Build test CloudEvents using the SDK:
            ```go
            e := cloudevents.NewEvent()
            e.SetType("google.cloud.pubsub.topic.v1.messagePublished")
            e.SetSource("//pubsub.googleapis.com/projects/p/topics/t")
            ```
            - TestMatch_ExactFilter_Matches
            - TestMatch_ExactFilter_NoMatch
            - TestMatch_MultipleFilters_AllMustMatch
            - TestMatch_EmptyTriggers_ReturnsEmpty
            - TestMatch_NoFilters_MatchesAll (trigger with no filters matches any event)
            - TestAttrValue_StandardAttrs
            - TestAttrValue_ExtensionAttr

            ### Verification gate
            ```bash
            go build ./internal/router/...
            go vet ./internal/router/...
            go test ./internal/router/... -v
            ```

            ### Constraints
            - Use a StorageReader interface (not *server.Storage directly) to avoid
              circular import between router and server packages.
            - Matching must be case-sensitive (CloudEvents attributes are case-sensitive).
            - A trigger with zero event_filters matches all events.
            - Import: `cloudevents "github.com/cloudevents/sdk-go/v2"`
