          task: |
            ## Wave 3 Agent C — Publisher gRPC Service + Wire-Up

            Implement the Eventarc Publishing API as a gRPC service and wire up
            the full server. The Publishing API is a separate gRPC service
            (google.cloud.eventarc.publishing.v1.Publisher) that clients use to
            publish events programmatically.

            Reference: https://cloud.google.com/eventarc/docs/reference/publishing/rpc
            Package: google.cloud.eventarc.publishing.v1
            Go client: cloud.google.com/go/eventarc/publishing/apiv1

            ### internal/publisher/server.go
            ```go
            package publisher

            // Server implements google.cloud.eventarc.publishing.v1.PublisherServer.
            type Server struct {
                publishingpb.UnimplementedPublisherServer
                router     RouterMatcher
                dispatcher EventDispatcher
            }

            // RouterMatcher is the interface subset needed by publisher.
            type RouterMatcher interface {
                Match(ctx context.Context, parent string, event cloudevents.Event) ([]*eventarcpb.Trigger, error)
            }

            // EventDispatcher is the interface subset needed by publisher.
            type EventDispatcher interface {
                Dispatch(ctx context.Context, trigger *eventarcpb.Trigger, event cloudevents.Event) (int, error)
            }

            func NewServer(router RouterMatcher, dispatcher EventDispatcher) *Server
            ```

            ### RPCs to implement

            **PublishEvents** (primary — fires triggers):
            ```
            PublishEvents(ctx, *PublishEventsRequest) (*PublishEventsResponse, error)
            ```
            Request fields: `channel` (resource name), `events` (repeated google.protobuf.Any).
            Processing:
            1. Extract parent from channel name (e.g. `projects/p/locations/l/channels/c` → `projects/p/locations/l`).
            2. For each event in req.Events: unpack to CloudEvent, extract type/source/subject attrs.
            3. Call router.Match(ctx, parent, attrs) to find matching triggers.
            4. For each matching trigger, call dispatcher.Dispatch(ctx, trigger, eventJSON, contentType).
            5. Return &PublishEventsResponse{} (empty on success).

            **PublishChannelConnectionEvents** (partner use case — minimal impl):
            ```
            PublishChannelConnectionEvents(ctx, *PublishChannelConnectionEventsRequest) (*PublishChannelConnectionEventsResponse, error)
            ```
            Same flow as PublishEvents but parent derived from channel_connection resource name.
            Minimal implementation: extract parent, match triggers, dispatch.

            NOTE: PublisherServer has exactly two methods: PublishEvents and
            PublishChannelConnectionEvents. There is no Publish method — do not
            implement one. Embed publishingpb.UnimplementedPublisherServer for
            forward compatibility.

            ### CloudEvent unpacking
            Events in PublishEventsRequest are `repeated google.protobuf.Any`.
            Strategy: marshal the Any to JSON via `protojson.Marshal`, then unmarshal
            into a `cloudevents.Event` using the sdk-go JSON unmarshaler:
            ```go
            import cloudevents "github.com/cloudevents/sdk-go/v2"

            var e cloudevents.Event
            rawJSON, _ := protojson.Marshal(anyVal)
            json.Unmarshal(rawJSON, &e)
            ```
            Then pass `e` to router.Match and dispatcher.Dispatch.
            If unmarshaling fails, log a warning and skip that event (don't fail the RPC).

            ### Update cmd/server/main.go
            Wave 1 Agent A created cmd/server/main.go with a temporary inline registration.
            Replace it to use server.NewGRPCServer() — the single registration point:
            ```go
            rtr := router.NewRouter(srv.Storage())
            dsp := dispatcher.NewDispatcher(nil)
            pub := publisher.NewServer(rtr, dsp)
            grpcServer := server.NewGRPCServer(srv, pub)
            ```
            Remove the old inline eventarcpb.RegisterEventarcServer / reflection.Register calls.
            Log: "Publisher service registered"
            No second port needed — all services share the same gRPC server.

            Also add a convenience HTTP endpoint for testing (lightweight, not the main path):
            - `POST /events` on a second port (env `EVENTARC_EVENTS_PORT`, default 8085)
            - Accepts CloudEvent JSON body, extracts attrs, calls router.Match + dispatcher.Dispatch
            - This is for curl-based testing; real clients use the gRPC Publisher service

            ### Tests (server_test.go)
            - TestPublishEvents_MatchingTrigger_Dispatches
            - TestPublishEvents_NoMatchingTriggers_ReturnsEmpty
            - TestPublishChannelConnectionEvents_Dispatches

            Use mock RouterMatcher and EventDispatcher.

