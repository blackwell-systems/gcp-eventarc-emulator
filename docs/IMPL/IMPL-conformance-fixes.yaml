            - Event with source `"//storage.googleapis.com/projects/_/buckets/my-bucket/objects/foo/bar"` → no match (extra segment)
            - Event with source `"//other.googleapis.com/projects/_/buckets/x/objects/y"` → no match

            **TestMatch_MatchPathPatternOperator_DoubleWildcard**: Create a trigger with:
            - EventFilter: `Attribute="source"`, `Value="//storage.googleapis.com/projects/**"`,
              `Operator="match-path-pattern"`
            Then:
            - Source `"//storage.googleapis.com/projects/foo/bar/baz"` → matches
            - Source `"//storage.googleapis.com/projects"` — this is ambiguous; test zero segments after "projects":
              source `"//storage.googleapis.com/projects/"` → matches (** matches empty segment sequence)
            - Source `"//other.googleapis.com/projects/foo"` → no match

            **TestMatch_PathPatternOperatorAlias**: same scenario as SingleWildcard but with
