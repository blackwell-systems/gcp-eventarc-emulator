            ## Agent B — Server Handler Fixes (validate_only, allow_missing, etag-delete, LRO metadata)

            ### Context

            Agent A (Wave 1) has updated `lro.Store.CreateDone` to accept two new parameters:
            `verb string` and `target string`. The new signature is:
            ```go
            func (s *Store) CreateDone(parent string, resource proto.Message, verb string, target string) (*longrunningpb.Operation, error)
            ```

            All 20 calls to `s.lro.CreateDone` in `internal/server/server.go` must be updated
            to pass these parameters. This file also needs handler-layer conformance fixes.

            ---

            ### Fix 1: Update all CreateDone calls (LRO-1)

            Every call to `s.lro.CreateDone(parent, resource)` becomes
            `s.lro.CreateDone(parent, resource, verb, target)`.

            Verb and target mapping for each method:

            | Method | verb | target |
            |--------|------|--------|
            | CreateTrigger | "create" | `fmt.Sprintf("%s/triggers/%s", req.GetParent(), req.GetTriggerId())` |
            | UpdateTrigger | "update" | `req.GetTrigger().GetName()` |
            | DeleteTrigger | "delete" | `req.GetName()` |
            | CreateChannel | "create" | `fmt.Sprintf("%s/channels/%s", req.GetParent(), req.GetChannelId())` |
            | UpdateChannel | "update" | `req.GetChannel().GetName()` |
            | DeleteChannel | "delete" | `req.GetName()` |
            | CreateChannelConnection | "create" | `fmt.Sprintf("%s/channelConnections/%s", req.GetParent(), req.GetChannelConnectionId())` |
            | DeleteChannelConnection | "delete" | `req.GetName()` |
            | CreateMessageBus | "create" | `fmt.Sprintf("%s/messageBuses/%s", req.GetParent(), req.GetMessageBusId())` |
            | UpdateMessageBus | "update" | `req.GetMessageBus().GetName()` |
            | DeleteMessageBus | "delete" | `req.GetName()` |
            | CreateEnrollment | "create" | `fmt.Sprintf("%s/enrollments/%s", req.GetParent(), req.GetEnrollmentId())` |
            | UpdateEnrollment | "update" | `req.GetEnrollment().GetName()` |
            | DeleteEnrollment | "delete" | `req.GetName()` |
            | CreatePipeline | "create" | `fmt.Sprintf("%s/pipelines/%s", req.GetParent(), req.GetPipelineId())` |
            | UpdatePipeline | "update" | `req.GetPipeline().GetName()` |
            | DeletePipeline | "delete" | `req.GetName()` |
            | CreateGoogleApiSource | "create" | `fmt.Sprintf("%s/googleApiSources/%s", req.GetParent(), req.GetGoogleApiSourceId())` |
            | UpdateGoogleApiSource | "update" | `req.GetGoogleApiSource().GetName()` |
            | DeleteGoogleApiSource | "delete" | `req.GetName()` |

            ---

            ### Fix 2: validate_only on all 18 mutating RPCs (LRO-3)

            Add a `validate_only` check in each mutating RPC AFTER permission checks and
            BEFORE storage calls.

            **For Create methods** (CreateTrigger, CreateChannel, CreateChannelConnection,
            CreateMessageBus, CreateEnrollment, CreatePipeline, CreateGoogleApiSource):
            ```go
            if req.GetValidateOnly() {
                // Validation passed; return a preview LRO without persisting.
                synthetic := proto.Clone(req.GetTrigger()).(*eventarcpb.Trigger)
                synthetic.Name = fmt.Sprintf("%s/triggers/%s", req.GetParent(), req.GetTriggerId())
                return s.lro.CreateDone(req.GetParent(), synthetic, "create", synthetic.Name)
            }
            ```
            Use the appropriate resource type for each method.

            **For Update methods** (UpdateTrigger, UpdateChannel, UpdateMessageBus,
            UpdateEnrollment, UpdatePipeline, UpdateGoogleApiSource):
            ```go
            if req.GetValidateOnly() {
                existing, err := s.storage.GetTrigger(ctx, req.GetTrigger().GetName())
                if err != nil {
                    return nil, err
                }
                return s.lro.CreateDone(parent, existing, "update", req.GetTrigger().GetName())
            }
            ```
            Use the appropriate Get and resource field for each method. For UpdateChannel,
            use `s.storage.GetChannel`.

            **For Delete methods** (DeleteTrigger, DeleteChannel, DeleteChannelConnection,
            DeleteMessageBus, DeleteEnrollment, DeletePipeline, DeleteGoogleApiSource):
            ```go
            if req.GetValidateOnly() {
                _, err := s.storage.GetTrigger(ctx, req.GetName())
                if err != nil {
                    return nil, err
                }
                return s.lro.CreateDone(parent, &emptypb.Empty{}, "delete", req.GetName())
            }
            ```
            Import `"google.golang.org/protobuf/types/known/emptypb"` for this.

            Note: `DeleteChannel` and `DeleteChannelConnection` do NOT have `allow_missing`
            or `etag` fields per the conformance report — only handle `validate_only` for them.

            ---

            ### Fix 3: allow_missing on Delete methods (ALLOW-MISSING-1)

            Applies to: DeleteTrigger, DeleteMessageBus, DeleteEnrollment, DeletePipeline,
            DeleteGoogleApiSource.

            (DeleteChannel and DeleteChannelConnection do NOT have allow_missing.)

            Replace the pattern:
            ```go
            trigger, err := s.storage.GetTrigger(ctx, req.GetName())
            if err != nil {
                return nil, err
            }
            if err := s.storage.DeleteTrigger(ctx, req.GetName()); err != nil {
                return nil, err
            }
            return s.lro.CreateDone(parent, trigger)
            ```

            With:
            ```go
            existing, err := s.storage.GetTrigger(ctx, req.GetName())
            if err != nil {
                if req.GetAllowMissing() && isNotFound(err) {
                    return s.lro.CreateDone(parent, &emptypb.Empty{}, "delete", req.GetName())
                }
                return nil, err
            }
            // etag check (Fix 4) goes here
            if err := s.storage.DeleteTrigger(ctx, req.GetName()); err != nil {
                return nil, err
            }
            return s.lro.CreateDone(parent, existing, "delete", req.GetName())
            ```

            ---

            ### Fix 4: etag validation on Delete methods (ETAG-2)

            Applies to: DeleteTrigger, DeleteMessageBus, DeleteEnrollment, DeletePipeline,
            DeleteGoogleApiSource.

            After fetching the existing resource (from Fix 3), add the etag check:
            ```go
            if reqEtag := req.GetEtag(); reqEtag != "" {
                if existing.GetEtag() != reqEtag {
                    return nil, status.Errorf(codes.Aborted,
                        "etag mismatch: provided %q does not match stored %q",
                        reqEtag, existing.GetEtag())
                }
            }
            ```

            The complete Delete method order (after all fixes) is:
            1. requireField check
            2. permission check
            3. validate_only check (Fix 2)
            4. GetX (fetch existing resource)
            5. allow_missing check (Fix 3 — if not found and allow_missing, return success)
            6. etag check (Fix 4 — if etag mismatch, return Aborted)
            7. DeleteX
            8. CreateDone with verb="delete"

            ---

            ### Fix 5: allow_missing on Update methods (ALLOW-MISSING-1)

            Applies to: UpdateTrigger, UpdateMessageBus, UpdateEnrollment, UpdatePipeline,
            UpdateGoogleApiSource.

            After the storage UpdateX call, intercept NotFound:
            ```go
            trigger, err := s.storage.UpdateTrigger(ctx, req.GetTrigger(), req.GetUpdateMask())
            if err != nil {
                if req.GetAllowMissing() && isNotFound(err) {
                    // Upsert: create the resource.
                    trigger, err = s.storage.CreateTrigger(ctx,
                        parent, lastSegment(req.GetTrigger().GetName()), req.GetTrigger())
                    if err != nil {
                        return nil, err
                    }
                } else {
                    return nil, err
                }
            }
            return s.lro.CreateDone(parent, trigger, "update", req.GetTrigger().GetName())
            ```

            Apply the equivalent pattern for MessageBus, Enrollment, Pipeline, GoogleApiSource.

            Add helpers to server.go (not a separate file):
            ```go
            // isNotFound reports whether err is a gRPC NotFound status.
            func isNotFound(err error) bool {
                return status.Code(err) == codes.NotFound
            }

            // lastSegment returns the last "/"-delimited segment of a resource name.
            func lastSegment(name string) string {
                idx := strings.LastIndex(name, "/")
                if idx < 0 {
                    return name
                }
                return name[idx+1:]
            }
            ```

            ---

            ### Fix 6: Required field validation additions

            In **CreateEnrollment**: after the `req.GetEnrollment() == nil` check, add:
            ```go
            if req.GetEnrollment().GetCelMatch() == "" {
                return nil, status.Errorf(codes.InvalidArgument, "enrollment.cel_match is required")
            }
            ```

            In **CreatePipeline**: after the `req.GetPipeline() == nil` check, add:
            ```go
            if len(req.GetPipeline().GetDestinations()) == 0 {
                return nil, status.Errorf(codes.InvalidArgument, "pipeline.destinations must not be empty")
            }
            ```

            In **CreateGoogleApiSource**: after the `req.GetGoogleApiSource() == nil` check, add:
            ```go
            if req.GetGoogleApiSource().GetDestination() == nil {
                return nil, status.Errorf(codes.InvalidArgument, "google_api_source.destination is required")
            }
            ```

            In **UpdateGoogleChannelConfig**: add name validation immediately after the nil check:
            ```go
            if req.GetGoogleChannelConfig().GetName() == "" {
                return nil, status.Errorf(codes.InvalidArgument, "google_channel_config.name is required")
            }
            ```

            ---

            ### Required imports for server.go

            Add these if not already present:
            - `"google.golang.org/protobuf/proto"` — for proto.Clone in validate_only
            - `"google.golang.org/protobuf/types/known/emptypb"` — for delete validate_only

            Existing imports already include `"fmt"` and `"strings"`.

            ---

            ### Tests to write

            **File to modify:** `internal/server/server_test.go`

            Add these test functions following the existing `package server` style and using
            `newTestServer(t)`:

            - `TestCreateTrigger_ValidateOnly`: set `ValidateOnly: true`, assert no error,
              op.Done==true, and GetTrigger returns NotFound (trigger not persisted).
            - `TestLROMetadata_Create`: create a trigger, unpack `op.Metadata` as
              `*eventarcpb.OperationMetadata` (use `anypb.UnmarshalTo`), assert
              `meta.Verb == "create"` and `meta.ApiVersion == "v1"`.
            - `TestDeleteTrigger_EtagMismatch`: create a trigger; call DeleteTrigger with
              `Etag: "wrong-etag"`; assert `codes.Aborted` error.
            - `TestDeleteTrigger_EtagMatch`: create a trigger; retrieve it to get its etag;
              call DeleteTrigger with the correct etag; assert success.
            - `TestDeleteTrigger_AllowMissing`: delete a non-existent trigger with
              `AllowMissing: true`; assert no error.
            - `TestUpdateTrigger_AllowMissing`: call UpdateTrigger with `AllowMissing: true`
              on a non-existent trigger; assert no error; assert trigger now exists via GetTrigger.
            - `TestDeleteMessageBus_EtagMismatch`: create a message bus; delete with wrong etag;
              assert `codes.Aborted`.
            - `TestDeleteMessageBus_AllowMissing`: delete non-existent bus with `AllowMissing: true`;
              assert success.
            - `TestUpdateMessageBus_AllowMissing`: update non-existent bus with `AllowMissing: true`;
              assert success.
            - `TestCreateEnrollment_MissingCelMatch`: create enrollment without `cel_match`;
              assert `codes.InvalidArgument`.
            - `TestCreatePipeline_MissingDestinations`: create pipeline without destinations;
              assert `codes.InvalidArgument`.
            - `TestCreateGoogleApiSource_MissingDestination`: create source without destination;
              assert `codes.InvalidArgument`.

            To unpack OperationMetadata from op.Metadata in tests:
            ```go
            import (
                eventarcpb "cloud.google.com/go/eventarc/apiv1/eventarcpb"
                "google.golang.org/protobuf/types/known/anypb"
            )
            // ...
            meta := &eventarcpb.OperationMetadata{}
            if err := op.Metadata.UnmarshalTo(meta); err != nil {
                t.Fatalf("UnmarshalTo OperationMetadata: %v", err)
            }
            ```

            ### Verification gate

            ```
            go build ./internal/server/...
            go vet ./internal/server/...
            go test ./internal/server/... -run "TestCreateTrigger|TestDeleteTrigger|TestUpdateTrigger|TestDeleteMessageBus|TestUpdateMessageBus|TestCreateEnrollment|TestCreatePipeline|TestCreateGoogleApiSource|TestLROMetadata"
            ```

            ### Constraints

            - Do NOT modify internal/lro/store.go (Agent A) or storage_*.go files (Agents C, E).
            - Do NOT modify internal/router/router.go (Agent D).
            - `isNotFound` and `lastSegment` helpers must be defined inline in server.go.
            - DeleteChannel and DeleteChannelConnection: only add validate_only handling,
              NOT allow_missing or etag (those fields do not exist on those request types).
            - For UpdateChannel: only add validate_only handling, NOT allow_missing
              (UpdateChannelRequest does not have allow_missing per the proto).
            - Do NOT add ID format regex validation (message_bus_id, pipeline_id, etc.) —
              the conformance report marks those as minor/P2 and they are out of scope.
            - For UpdateX validate_only where the resource might not exist, return the error
              directly without checking allow_missing (validate_only check comes before the
              allow_missing upsert path).
          files:
            - internal/server/server.go
            - internal/server/server_test.go
          dependencies:
            - A
