    Parallelization value: HIGH. go test ./... is non-trivial; 5 agents in 2 waves;
    each agent touches 2-6 files with logic, tests, and edge cases.

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~40 min (Wave 1: 4 agents x ~10 min avg parallel, Wave 2: 1 agent x ~15 min)
    - Merge and verification: ~5 min
    Total SAW time: ~55 min

    Sequential baseline: ~75 min (5 agents x 15 min avg sequential)
    Time savings: ~20 min (27% faster), plus coordination benefit.
