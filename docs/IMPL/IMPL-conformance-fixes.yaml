pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Agent B's changes are large (20+ call sites, 6 distinct fix categories).
            A misunderstanding of the validate_only semantics for Update methods could
            cause incorrect behavior where validate_only is checked after the storage call
            instead of before it.
          likelihood: medium
          impact: medium
          mitigation: |-
            The IMPL task for Agent B specifies the order explicitly for Delete methods
            (7-step sequence) and for Update/Create methods separately. Agent B should
            implement and test validate_only first (TestCreateTrigger_ValidateOnly) before
            moving to allow_missing and etag.
        - scenario: |-
            lro.Store.CreateDone signature change (Agent A) causes a build failure in
            server.go if Agent B is applied before Agent A's wave merges. The Wave 2
            gating prevents this, but if agents are mis-sequenced, all 20 CreateDone
            calls will fail to compile.
          likelihood: low
          impact: high
          mitigation: |-
            Wave 2 is gated on Wave 1 completion. Agent B's dependency: [A] annotation
            ensures the Orchestrator will not launch B until A has merged.
        - scenario: |-
            matchPathPattern edge case: ** at end of pattern with zero trailing segments.
            If matchSegs does not correctly handle the i=0 iteration (** matches zero segments),
            patterns like "//prefix/**" may fail to match "//prefix/segment".
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent D's task includes a dedicated test for ** matching zero segments
            (TestMatch_MatchPathPatternOperator_DoubleWildcard). The matchSegs pseudocode
            in the task iterates from i=0 to len(vSegs) inclusive, covering zero consumption.
        - scenario: |-
            UpdateEnrollment immutability: removing message_bus from the else branch
            may cause existing tests that rely on no-mask updates setting message_bus to fail.
            Agent E must audit the existing storage_messagebus_test.go for such tests.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent E's task explicitly notes: "TestUpdateEnrollment_NoMask_MessageBusPreserved"
            documents the new behavior. Agent E must review existing tests and update any
            that previously expected message_bus to change via no-mask updates.
        - scenario: |-
            Channel.ActivationToken field may not exist on the proto version in use.
            If the field is absent, Agent C's code will fail to compile.
          likelihood: low
          impact: high
          mitigation: |-
            The conformance report (CHANNEL-1) confirms the field exists. Agent C is
            instructed to verify with `go doc` before implementing. If the field is absent,
            Agent C should skip the ActivationToken assignment and document the omission.
        - scenario: |-
            proto.Clone is not imported in server.go currently. Agent B needs it for
            validate_only Create paths. A missing import causes compile failure.
          likelihood: low
          impact: low
          mitigation: |-
            Agent B's task lists required imports explicitly. The existing imports do not
            include proto directly but the storage files do; Agent B must add it to server.go.
