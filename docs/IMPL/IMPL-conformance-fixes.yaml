    The work decomposes cleanly across 5 agents with disjoint file ownership:

    1. Agent A — internal/lro/store.go: LRO metadata (update CreateDone signature)
    2. Agent B — internal/server/server.go: validate_only, allow_missing, etag-delete,
       required-field validation; all gRPC handler layer changes
    3. Agent C — internal/server/storage.go + storage_channel.go + their tests:
