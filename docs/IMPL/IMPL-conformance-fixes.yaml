            ## Agent A — LRO Metadata: Update CreateDone in internal/lro/store.go

            ### What to implement

            Update `lro.Store.CreateDone` to accept two new parameters (`verb string`,
            `target string`) and populate `Operation.metadata` with an
            `eventarcpb.OperationMetadata` struct.

            **File to modify:** `internal/lro/store.go`

            **Current signature:**
            ```go
            func (s *Store) CreateDone(parent string, resource proto.Message) (*longrunningpb.Operation, error)
            ```

            **New signature:**
            ```go
            func (s *Store) CreateDone(parent string, resource proto.Message, verb string, target string) (*longrunningpb.Operation, error)
            ```

            ### Implementation details

            After creating `anyVal` from the resource (the existing `anypb.New(resource)` call),
            also create a metadata `anypb.Any`:

            ```go
            now := timestamppb.Now()
            meta := &eventarcpb.OperationMetadata{
                CreateTime: now,
                EndTime:    now,
                Target:     target,
                Verb:       verb,
                ApiVersion: "v1",
            }
            metaAny, err := anypb.New(meta)
            if err != nil {
                return nil, fmt.Errorf("lro: pack metadata into anypb: %w", err)
            }
            ```

            Then set `op.Metadata = metaAny` on the Operation struct before storing it.

            Add import for `eventarcpb "cloud.google.com/go/eventarc/apiv1/eventarcpb"` and
            `"google.golang.org/protobuf/types/known/timestamppb"` to the lro package imports
            if not already present.

            ### Tests to write

            **File to modify:** `internal/lro/store_test.go`

            Examine the existing tests in that file and follow the same style. Update any
            existing calls to `CreateDone` to pass the new parameters. Add tests:

            1. `TestCreateDone_MetadataPopulated`: call `CreateDone` with verb="create" and
               a non-empty target, then:
               - Assert `op.Metadata` is non-nil
               - Unpack `op.Metadata` as `*eventarcpb.OperationMetadata` using `anypb.UnmarshalTo`
               - Assert `meta.Verb == "create"`, `meta.ApiVersion == "v1"`, `meta.Target` is correct,
                 `meta.CreateTime != nil`, `meta.EndTime != nil`

            2. `TestCreateDone_VerbDelete`: same but verb="delete", assert `meta.Verb == "delete"`.

            ### Verification gate

            ```
            go build ./internal/lro/...
            go vet ./internal/lro/...
            go test ./internal/lro/...
            ```

            ### Constraints

            - Do NOT change WaitOperation, GetOperation, DeleteOperation, or ListOperations.
            - `verb` must be passed by callers ("create", "update", "delete") — never inferred inside.
            - `target` is the full resource name, not the parent.
            - Update any existing test calls to CreateDone in store_test.go to pass the two new parameters.
            - Do NOT modify any files in internal/server/ or internal/router/.
