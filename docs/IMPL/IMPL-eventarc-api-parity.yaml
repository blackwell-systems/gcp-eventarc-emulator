title: Eventarc API Parity — Binary Content Mode + Missing RPCs
feature_slug: eventarc-api-parity
verdict: SUITABLE
suitability_assessment: |
    SUITABLE. The work decomposes cleanly into 5 agents across 2 waves with fully
    disjoint file ownership.

    File decomposition:
    - Agent A (Wave 1): Binary content mode fix in internal/dispatcher/http.go +
      test updates in internal/dispatcher/http_test.go. Independent of all other work.
    - Agent B (Wave 1): Channel + ChannelConnection + GoogleChannelConfig storage
      methods in internal/server/storage.go (new section appended) +
      internal/authz/permissions.go (new entries appended) +
      internal/server/storage_channel_test.go (new test file).
    - Agent C (Wave 1): MessageBus + Enrollment storage methods in
      internal/server/storage.go conflicts with Agent B — RESOLVED by splitting
      into separate new files: internal/server/storage_channel.go (Agent B) and
      internal/server/storage_messagebus.go (Agent C). Each agent creates a new
      file in the same package, disjoint ownership enforced.
    - Agent D (Wave 1): Pipeline + GoogleApiSource storage methods in
      internal/server/storage_pipeline.go (new file).
    - Agent E (Wave 2): All new RPC method implementations in
      internal/server/server.go — depends on Wave 1 storage methods being available.

    I1 self-check: storage.go is a potential conflict point. Resolution: each agent
    creates a new file in package server (storage_channel.go, storage_messagebus.go,
    storage_pipeline.go) rather than appending to storage.go. The existing storage.go
    stays with Agent B only for permissions.go updates; storage.go itself is not
    touched by any Wave 1 agent. NewStorage() in storage.go must be updated to
    initialize the new maps — this is assigned to Agent E in Wave 2 (integration
    wave) since NewStorage() is the single integration point after all storage
    modules are complete.

    Actually on further review: NewStorage() needs to initialize all new maps.
    This is a single function in storage.go. To avoid a Wave 2 bottleneck, the
    best approach is: each Wave 1 storage agent adds a new file with storage
    methods only (NOT touching NewStorage). A single Wave 2 integration step
    updates NewStorage() and adds the Server struct field wiring in server.go.
    This is Agent E's job, giving it clear ownership of storage.go + server.go.

    Pre-implementation status: all 8 scope items are TODO (unimplemented). The
    UnimplementedEventarcServer returns codes.Unimplemented for all missing RPCs.

    Parallelization value: High.
    - Build + test cycle: go test ./... takes ~3-5 seconds but agents work on
      non-trivial code with multiple methods, tests, and edge cases per resource type.
    - Wave 1: 4 parallel agents (A-D), estimated ~8 min each.
    - Wave 2: 1 agent (E) sequential, estimated ~12 min.
    - Total SAW time: ~22 min vs ~50 min sequential.

    Estimated times:
    - Scout phase: ~15 min (deep codebase + proto analysis)
    - Agent execution: Wave 1 ~8 min (4 parallel) + Wave 2 ~12 min = ~20 min
    - Merge & verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~50 min
    Time savings: ~10 min (20% faster). Coordination value high regardless.

    Recommendation: Clear speedup, plus the IMPL doc provides audit trail for
    systematic API parity coverage.
