pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |-
            Wave 1 storage agents write methods referencing struct fields that don't
            exist yet (channels, messageBuses, etc.). The go compiler will reject
            the new files until Agent E adds those fields in Wave 2. Individual
            agent builds will fail until Wave 2 merges.
          likelihood: high
          impact: low
          mitigation: |-
            This is expected and by design. Agent prompts explicitly warn about this.
            The verification gate for Wave 1 agents uses `go vet` (syntax check)
            instead of `go build`. Full build is gated on Wave 2.
        - scenario: |-
            Agent B modifies permissions.go adding all permission entries. If the
            exact RPC method name strings don't match what the gRPC generated code
            uses, IAM checks will silently pass (no matching entry). This is a
            correctness risk, not a build failure.
          likelihood: low
          impact: medium
          mitigation: |-
            The permissionMap keys are the proto service method names (e.g.
            "GetChannel"), which exactly match the RPC method names on the Server.
            The existing triggers use this exact pattern. The agent prompt specifies
            the exact key names to use. Verify by grepping eventarc_grpc.pb.go for
            the method names if unsure.
        - scenario: |-
            Binary content mode test updates in http_test.go may miss the two tests
            that assert cloudEventsJSONContentType and leave them failing.
          likelihood: medium
          impact: low
          mitigation: |-
            Agent A's prompt explicitly lists both tests by name that need updating
            (TestDispatch_HttpEndpoint_Success and TestDispatch_ContentType_IsCloudEventsJSON).
            The verification gate runs all dispatcher tests with -v.
        - scenario: |-
            Agent E's parentFromResource() helper strips two path segments but
            GoogleChannelConfig is a singleton with no trailing ID segment
            (name is "projects/p/locations/l/googleChannelConfig"). If
            parentFromResource is used for GoogleChannelConfig, it would return
            "projects/p/locations" instead of "projects/p/locations/l".
          likelihood: high
          impact: low
          mitigation: |-
            GoogleChannelConfig RPCs do not need a parent (Get/Update only, no LRO
            parent context needed). Agent E's prompt notes that GoogleChannelConfig
            returns the config directly (not an LRO), so parentFromResource is never
            called for it.
        - scenario: |-
            The ListMessageBusEnrollments RPC lists enrollments for a given message
            bus parent (the bus name is the parent). If Agent C stores enrollments
            by their own key (projects/p/locations/l/enrollments/e) but
            ListMessageBusEnrollments must filter by the enrollment's messageBus
            field, a naïve prefix scan won't work.
          likelihood: medium
          impact: medium
          mitigation: |-
            Agent C's prompt specifies: ListMessageBusEnrollments scans ALL
            enrollments, filters by enrollment.GetMessageBus() == busName, and
            returns the enrollment resource names ([]string) — matching the proto
            definition of ListMessageBusEnrollmentsResponse.Enrollments which is
            []string, not []*Enrollment. The storage method signature reflects this.
