waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Context
            You are implementing a binary content mode fix for the HTTP dispatcher
            in the GCP Eventarc emulator.

            ## Repository
            /Users/dayna.blackwell/code/gcp-eventarc-emulator

            ## What to implement

            ### internal/dispatcher/http.go
            Change the `Dispatch()` method to send events in CloudEvents HTTP
            binary content mode instead of structured (JSON envelope) mode.

            Binary content mode rules (CloudEvents HTTP binding spec):
            - Required headers: `Ce-Specversion`, `Ce-Type`, `Ce-Source`, `Ce-Id`
            - Optional headers: `Ce-Subject` (if non-empty), `Ce-Time` (if non-zero),
              `Ce-Dataschema` (if non-empty)
            - Extension attributes: each extension key becomes `Ce-<extension-name>` header
            - Body: the raw event data bytes (call `event.DataBytes()` to get them, or
              marshal via `event.MarshalJSON()` but only extract the data field — simplest:
              use `event.Data()` raw bytes directly via the event struct)
            - Content-Type header: `event.DataContentType()`, defaulting to
              `"application/json"` if empty

            Implementation approach for setting body + data content type:
            1. Get data bytes: use `event.DataEncoded` field directly (it is `[]byte`)
               or call `json.Marshal(event)` then extract the `"data"` field. The
               simplest correct approach: serialize only the event data using
               `event.MarshalJSON()` is NOT right (that gives structured mode). Instead:
               - If `event.DataEncoded` is not nil/empty: use it directly as body
               - Otherwise: body is empty (`[]byte{}`)
            2. Build request with that body
            3. Set Ce-* headers from event attributes
            4. Set `Content-Type` to `event.DataContentType()` (fall back to `"application/json"`)

            For the Ce-* headers, access event attributes via the event reader methods:
            - `event.SpecVersion()` → `Ce-Specversion`
            - `event.Type()` → `Ce-Type`
            - `event.Source()` → `Ce-Source`
            - `event.ID()` → `Ce-Id`
            - `event.Subject()` → `Ce-Subject` (only if non-empty)
            - `event.Time()` → `Ce-Time` as RFC3339 (only if non-zero)
            - `event.DataSchema()` → `Ce-Dataschema` (only if non-empty)
            - `event.Extensions()` → each key/value as `Ce-<key>: <value>` headers

            Remove the `cloudEventsJSONContentType` constant and `json.Marshal(event)`
            body encoding. Keep the `defaultCloudRunBaseURL`, `defaultTimeout`, and
            `destinationURL` function unchanged.

            ### internal/dispatcher/http_test.go
            Update existing tests that currently assert `Content-Type:
            application/cloudevents+json` to assert binary mode behavior instead:

            1. `TestDispatch_HttpEndpoint_Success`: update to check that
               `Content-Type` is `"application/json"` (binary mode, not structured).
               Also check that `Ce-Specversion`, `Ce-Type`, `Ce-Source`, `Ce-Id`
               headers are present and non-empty.

            2. `TestDispatch_ContentType_IsCloudEventsJSON`: rename to
               `TestDispatch_ContentType_IsBinaryMode` and update assertions:
               - `Content-Type` should be `"application/json"` (not `"application/cloudevents+json"`)
               - `Ce-Specversion: 1.0` header must be present
               - `Ce-Type` header must be present and match the event type
               - `Ce-Source` header must be present

            3. Add a new test `TestDispatch_BinaryMode_Headers` that:
               - Creates an event with a specific type, source, id, subject, and
                 one extension (`testkey: testval`)
               - Dispatches it
               - Asserts all required Ce-* headers are present and correct values
               - Asserts `Ce-Subject` is present (since subject is set)
               - Asserts `Ce-Testkey: testval` header is present

            ## Constraints
            - Do NOT change the `Dispatch()` function signature.
            - Do NOT change `destinationURL()`.
            - The `cloudEventsJSONContentType` constant can be removed or repurposed
              as `binaryModeDataContentType = "application/json"`.
            - The `newTestEvent()` helper already sets type, source, and id — extend
              it or create a separate helper for the header test.
            - All existing non-content-type tests (404 handling, CloudRun destination,
              unsupported destination) should continue to pass.

            ## Verification gate
            ```
            go build ./internal/dispatcher/...
            go vet ./internal/dispatcher/...
            go test ./internal/dispatcher/... -v
            ```
          files:
            - internal/dispatcher/http.go
