            #### Channel methods
            Storage key: `"{parent}/channels/{channelID}"`
            e.g. `"projects/p/locations/l/channels/my-channel"`

            ```go
            func (s *Storage) CreateChannel(ctx context.Context, parent, channelID string, ch *eventarcpb.Channel) (*eventarcpb.Channel, error)
            func (s *Storage) GetChannel(ctx context.Context, name string) (*eventarcpb.Channel, error)
            func (s *Storage) UpdateChannel(ctx context.Context, ch *eventarcpb.Channel, mask *fieldmaskpb.FieldMask) (*eventarcpb.Channel, error)
            func (s *Storage) DeleteChannel(ctx context.Context, name string) error
            func (s *Storage) ListChannels(ctx context.Context, parent string, pageSize int32, pageToken string) ([]*eventarcpb.Channel, string, error)
            ```

            Patterns to follow (from storage.go):
            - CreateChannel: check AlreadyExists, set Name/Uid/CreateTime/UpdateTime,
              store cloned proto, return clone. Use `rand.Uint64()` for uid hex.
            - GetChannel: RLock, lookup, return NotFound if missing, return clone.
            - UpdateChannel: Lock, lookup, apply mask (supported fields: labels,
              crypto_key_name, state), set UpdateTime, return clone.
            - DeleteChannel: Lock, lookup, return NotFound if missing, delete.
            - ListChannels: RLock, collect by prefix `"{parent}/channels/"`, sort by
              name, paginate with integer token (same as ListTriggers pattern).

            Clone helpers to add:
            ```go
            func cloneChannel(c *eventarcpb.Channel) *eventarcpb.Channel
            func cloneChannelConnection(cc *eventarcpb.ChannelConnection) *eventarcpb.ChannelConnection
            func cloneGoogleChannelConfig(cfg *eventarcpb.GoogleChannelConfig) *eventarcpb.GoogleChannelConfig
            ```

            #### ChannelConnection methods
            Storage key: `"{parent}/channelConnections/{connID}"`
            Note: No Update RPC for ChannelConnection — only Get, List, Create, Delete.

            ```go
            func (s *Storage) CreateChannelConnection(ctx context.Context, parent, connID string, conn *eventarcpb.ChannelConnection) (*eventarcpb.ChannelConnection, error)
            func (s *Storage) GetChannelConnection(ctx context.Context, name string) (*eventarcpb.ChannelConnection, error)
            func (s *Storage) DeleteChannelConnection(ctx context.Context, name string) error
            func (s *Storage) ListChannelConnections(ctx context.Context, parent string, pageSize int32, pageToken string) ([]*eventarcpb.ChannelConnection, string, error)
            ```

            Prefix for list: `"{parent}/channelConnections/"`.
            CreateChannelConnection sets Name, Uid (rand hex), CreateTime, UpdateTime.

            #### GoogleChannelConfig methods
            Storage key: `"{name}"` — the full resource name is the key directly,
            e.g. `"projects/p/locations/l/googleChannelConfig"`.
            Singleton: Get never returns NotFound — if no config is stored, return
            a zero-value `&eventarcpb.GoogleChannelConfig{Name: name}`.

            ```go
            func (s *Storage) GetGoogleChannelConfig(ctx context.Context, name string) (*eventarcpb.GoogleChannelConfig, error)
            func (s *Storage) UpdateGoogleChannelConfig(ctx context.Context, cfg *eventarcpb.GoogleChannelConfig, mask *fieldmaskpb.FieldMask) (*eventarcpb.GoogleChannelConfig, error)
            ```

            UpdateGoogleChannelConfig supported mask fields: `crypto_key_name`, `labels`.
            If no config stored yet, create one. Always set UpdateTime. No LRO for
            GoogleChannelConfig (returns the config directly, not an operation).

