            This is required because Agent A changed the NewServer signature.

            ## Fix: --version flag (finding 5, UX-improvement)

            In ALL THREE cmd/* main.go files, add a `--version` flag that prints the version
            and exits 0. Add this BEFORE `flag.Parse()`:

            ```go
