                fmt.Fprintf(os.Stderr, "GCP Eventarc Emulator v%s — gRPC + REST server\n\n", version)
                fmt.Fprintf(os.Stderr, "Usage: server-dual [flags]\n\nFlags:\n")
                flag.PrintDefaults()
                fmt.Fprintf(os.Stderr, "\nEnvironment Variables:\n")
                fmt.Fprintf(os.Stderr, "  EVENTARC_EMULATOR_HOST  gRPC host:port (e.g. localhost:9085)\n")
                fmt.Fprintf(os.Stderr, "  EVENTARC_HTTP_PORT      HTTP port (default: 8085)\n")
                fmt.Fprintf(os.Stderr, "  GCP_MOCK_LOG_LEVEL      Log level: debug, info, warn, error (default: info)\n")
                fmt.Fprintf(os.Stderr, "  IAM_MODE                IAM enforcement: off, permissive, strict (default: off)\n")
            }
            ```

            ## Fix: flag naming inconsistency (finding 15, UX-polish)

            File: cmd/server/main.go only.

            The gRPC-only `server` binary uses `--port` while the others use `--grpc-port`.
            Add `--grpc-port` as an alias. The simplest approach that avoids breaking existing
            users of `--port`:

            ```go
            // Keep --port for backwards compatibility; add --grpc-port as the canonical name.
            port     = flag.Int("port", getEnvPort("EVENTARC_EMULATOR_HOST", 9085), "Port to listen on (deprecated: use --grpc-port)")
            grpcPort = flag.Int("grpc-port", getEnvPort("EVENTARC_EMULATOR_HOST", 9085), "gRPC port to listen on")
            ```

            In main(), use `*grpcPort` if non-default, falling back to `*port`:
            ```go
            listenPort := *grpcPort
            if listenPort == 9085 && *port != 9085 {
                // --port was explicitly set but --grpc-port was not
                listenPort = *port
            }
            ```
            Then use `listenPort` everywhere `*port` was used.

            This is a compatibility shim. Both flags work; `--grpc-port` is now canonical.

            ## Fix: malformed JSON / clean error messages (finding 12, UX-improvement)

            Note: The malformed JSON error comes from grpc-gateway's JSON unmarshaler, which
