            signature (3 args instead of 2).
          likelihood: low
          impact: high
          mitigation: |
            Agent E's task explicitly states the signature change and shows the exact
            call-site update required. The build gate in Wave 2 will catch this before
            any merge.
        - scenario: |
            The server-dual/main.go ready-message ordering fix (readyCh channel) causes
            a race condition if gRPC Serve() fails synchronously before close(readyCh).
          likelihood: low
          impact: medium
          mitigation: |
            The readyCh is closed in the gRPC goroutine before calling Serve — if Serve
            fails immediately the goroutine calls log.Fatalf which terminates the process
            before main reads from readyCh. No hang. Agent E should test that the server
            starts and the ready log appears after the gRPC log.
        - scenario: |
            eventarcpb.EventType struct fields differ from what Agent C assumes (Type,
            Description may be named differently in the protobuf-generated code).
          likelihood: low
          impact: medium
          mitigation: |
            Agent C's task instructs verification via grep against the installed module.
            The proto-generated struct fields match the Eventarc proto definition which
            uses `type` and `description` snake-case → Go PascalCase = Type, Description.
        - scenario: |
            Adding GetChannelExists to storage_channel.go in Agent C creates a new exported
            method while Agent A references the interface in publisher/server.go. If agents
            are merged in the wrong order the build fails between merges.
          likelihood: low
          impact: medium
          mitigation: |
            Both are in Wave 1 — they are merged together by the orchestrator after both
            complete. The orchestrator runs go build ./... post-merge to catch any issues.
            The interface contract exactly specifies the method signature.
        - scenario: |
            The trigger validation added in server.go (require destination + event_filters)
            breaks an existing integration test that creates triggers without those fields.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A runs go test ./internal/server/... as part of verification. Any
            existing test that creates a bare trigger will fail the test gate, prompting
            Agent A to update those tests to include required fields. This is the correct
            behavior — those tests were validating the wrong thing.
