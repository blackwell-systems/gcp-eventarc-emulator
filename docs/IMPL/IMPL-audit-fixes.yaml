            ```

            The `version` variable is already declared as `"0.1.0"` in each file.
            Make sure `"fmt"` and `"os"` are in the import block (they already are).

            ## Fix: log level validation (finding 6, UX-improvement)

            In ALL THREE cmd/* main.go files, add a validation function and call it after
            flag.Parse():

            ```go
            // validateLogLevel returns an error if the log level is not one of the
            // accepted values.
            func validateLogLevel(level string) error {
                switch level {
                case "debug", "info", "warn", "error":
                    return nil
                default:
                    return fmt.Errorf("invalid --log-level %q: must be one of: debug, info, warn, error", level)
                }
            }
            ```

            After `flag.Parse()` (and after the version check), add:
            ```go
            if err := validateLogLevel(*logLevel); err != nil {
                fmt.Fprintln(os.Stderr, err)
                os.Exit(1)
            }
            ```

            ## Fix: log IAM mode at startup (finding 9, UX-improvement)

            In ALL THREE cmd/* main.go files, after creating the server (`srv, err := server.NewServer()`),
            add a log line:

            ```go
            log.Printf("IAM mode: %s", srv.IAMMode())
            ```

            Place this after `if err != nil { log.Fatalf(...) }` and before creating the router.

            ## Fix: consistent startup log format (finding 16, UX-polish)

            Standardize the startup log sequence across all three binaries. After all the
