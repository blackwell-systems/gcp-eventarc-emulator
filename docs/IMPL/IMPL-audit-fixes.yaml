title: Cold-Start UX Audit Fixes
feature_slug: audit-fixes
verdict: SUITABLE
suitability_assessment: |
    All 20 audit findings are clearly implementable with known file locations and
    well-defined fix strategies. No root-cause investigation is required.

    File decomposition: changes span 9 distinct files across 4 packages. The
    publisher, storage, gateway, cmd, and examples layers are independent enough
    to support 4-5 parallel agents with disjoint ownership.

    The cmd/* main.go files all need startup-log and flag changes together. Because
    agents C (storage) and E (cmd) operate on entirely separate packages, and agents
    A (publisher+server) and B (gateway) are independent, Wave 1 can run 4 agents
    in parallel. Wave 2 has a single agent for cmd/* (sequenced after Wave 1 so
    IAM mode is stable before cmd/* references it in startup logs).

    Pre-implementation status: all 20 findings confirmed as TODO against current
    codebase (v0.1.0, commit 8855e91). None are already fixed.

    Time estimate:
      Scout:  ~15 min
      Wave 1: ~20 min (4 agents × ~20 min avg, fully parallel)
      Wave 2: ~15 min (1 agent)
      Merge/verify: ~5 min
      Total SAW: ~55 min
      Sequential baseline: ~120 min
      Savings: ~65 min (~54% faster)
