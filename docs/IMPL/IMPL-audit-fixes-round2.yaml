            **C3: Fix webhook-receiver run command in docs**
            Running `go run ./examples/webhook-receiver` from the project root fails because
            the webhook-receiver is a separate Go module. Fix in two places:
            1. `README.md`: search for all occurrences of `go run ./examples/webhook-receiver`
