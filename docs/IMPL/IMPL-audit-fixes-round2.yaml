pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            C1/C2 LRO rewriter — Agent A's URL rewriting logic may have edge cases.
            For example, a path like /v1/projects/P/locations/L/operations may be misidentified
            as a GetOperation request instead of ListOperations, or the name reconstruction
            from the URL may include/exclude the /v1/ prefix incorrectly, causing the
            lro.Store lookup to fail.
          likelihood: medium
          impact: high
          mitigation: |
            Agent A should write explicit tests covering both GetOperation (path ends with /ID)
            and ListOperations (path ends with /operations) scenarios. The lro.Store key is
            exactly "projects/P/locations/L/operations/ID" — the URL rewriter must produce
            this exact string as the name in the gRPC request (after stripping /v1/).
        - scenario: |
            Wave 1 conflict on cmd mains — Agent C modifies all three cmd mains. Agent D is
            instructed not to touch them. If Agent D changes the constructor signatures for
            NewDispatcher/NewRouter/NewServer, the cmd mains will fail to compile after
            Agent C's wave merges (since Agent C does not update those calls).
          likelihood: medium
          impact: high
          mitigation: |
            Agent D MUST keep the nil-logger as a default. The old zero-argument form
            `NewDispatcher(nil)` becomes `NewDispatcher(nil, nil)` — but Agent C's unchanged
            cmd main code calls `NewDispatcher(nil)` (one arg), which will not compile.
            Resolution: Agent D should NOT change the cmd mains, and the call sites in cmd
            mains must still compile. To prevent compile failure, Agent D must update the
            cmd mains' constructor call sites even though Agent C owns those files in Wave 1.
            REVISED PLAN: Make the logger parameter a variadic option to avoid breaking call
            sites: `func NewDispatcher(client *http.Client, opts ...DispatcherOption) *Dispatcher`
            OR use a separate `WithLogger(l *logger.Logger)` option. This avoids any call-site
            breakage. Agent D should choose the variadic approach.
        - scenario: |
            Multi-error validation (I6) requires google.golang.org/genproto/googleapis/rpc/errdetails.
            This package may not be in go.mod as a direct dependency.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B should check go.mod first. Run `go get google.golang.org/genproto/googleapis/rpc/errdetails`
            if needed. The package is typically a transitive dependency of google.golang.org/grpc.
            Fallback: return a single concatenated error message string instead of FieldViolations.
        - scenario: |
            C5 IAM permissive fix — emulatorauth.AuthMode type may not be a string-comparable
            type or "permissive" may be spelled differently in the library.
          likelihood: low
          impact: medium
          mitigation: |
            Agent B should inspect the emulatorauth package. The code already does
            `s.iamMode = config.Mode` and `string(s.iamMode)` — so string comparison works.
            The value "permissive" is confirmed by cmd/server-dual/main.go help text.
        - scenario: |
            P6 lro/store.go bracket fix (Agent G) conflicts with lro/store_test.go tests
            that Agent B wrote in Wave 1 asserting the old %q format in error messages.
          likelihood: low
          impact: low
          mitigation: |
            Agent G should run `go test ./internal/lro/...` after the P6 change and fix any
            test string assertions from the old format to the new bracket format.
        - scenario: |
            C4 sdk-demo channel auto-creation — examples/sdk-demo is a separate Go module.
            The eventarcpb.CreateChannelRequest type may not be available or may require a
            different import path in the sdk-demo's go.mod.
          likelihood: low
          impact: medium
          mitigation: |
            Agent C should check examples/sdk-demo/go.mod for the cloud.google.com/go/eventarc
            version and verify CreateChannel is available. The sdk-demo already uses eventarcpb
            types (e.g. CreateTriggerRequest) so the import path is already correct.
            If codes/status are not imported, add them.
