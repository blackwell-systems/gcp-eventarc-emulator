waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## Agent A — LRO Project-Scoped REST Routes (C1 + C2)

            ### Context
            The gRPC-gateway generated file `internal/gen/google/longrunning/operations.pb.gw.go`
            registers these HTTP patterns for the Operations service:
            - pattern_Operations_ListOperations_0: GET /v1/operations (name=literal segment)
            - pattern_Operations_GetOperation_0: GET /v1/operations/** (wildcard after /operations/)

            LRO names are generated as `projects/P/locations/L/operations/ID` in
            `internal/lro/store.go` (see CreateDone, line 53: `name := parent + "/operations/" + uuid`).
            When a client follows the `name` field from a Create response and does:
              GET /v1/projects/P/locations/L/operations/ID
            the gateway returns NOT_FOUND because no pattern matches that path.

            ### Root cause
            The gateway only registers patterns under `/v1/operations/...`. The LRO names
            use a project-scoped prefix. No pattern covers `/v1/projects/*/locations/*/operations/*`.

            ### What to implement
            In `internal/gateway/gateway.go`, import the longrunning client and register
            additional HTTP routes on the mux after `RegisterOperationsHandlerClient`.

            Store the Operations gRPC client in the Gateway struct or as a local in New():

            ```go
            opsClient := longrunninggw.NewOperationsClient(conn)
            ```

            Then register two new handlers using `mux.HandlePath`:

            **Route 1 — GetOperation (project-scoped):**
            ```go
            mux.HandlePath("GET", "/v1/{name=projects/*/locations/*/operations/*}",
                func(w http.ResponseWriter, r *http.Request, pathParams map[string]string) {
                    name := pathParams["name"]
                    // name = "projects/P/locations/L/operations/ID" (without /v1/ prefix)
                    // but grpc-gateway HandlePath may include the full match — verify.
                    // Reconstruct from individual params if needed:
                    // name = fmt.Sprintf("projects/%s/locations/%s/operations/%s",
                    //     pathParams["project"], pathParams["location"], pathParams["operation"])
                    ctx := r.Context()
                    op, err := opsClient.GetOperation(ctx, &longrunninggw.GetOperationRequest{Name: name})
                    if err != nil {
                        runtime.DefaultHTTPErrorHandler(ctx, mux, outboundMarshaler, w, r, err)
                        return
                    }
                    // marshal and write op as JSON
                })
            ```

            NOTE: `runtime.ServeMux.HandlePath` accepts Go template-style path patterns.
            Check grpc-gateway v2 docs for the exact pattern syntax. If HandlePath does not
            support wildcard patterns, use a custom net/http.Handler registered via
            `mux.Handle(http.MethodGet, runtime.MustPattern(...), handler)` with the
            appropriate pattern tokens.

            A simpler approach that avoids grpc-gateway pattern complexity:
            1. Keep the existing `RegisterOperationsHandlerClient` call unchanged.
            2. Wrap the mux with a custom `http.Handler` in `gateway.go` that pre-processes
               requests: if the path matches `/v1/projects/*/locations/*/operations[/*]`,
               rewrite the URL to `/v1/operations[/{op-id}]` (stripping the project prefix)
               and forward to the original mux. This works because `lro/store.go`'s
               `GetOperation` does `strings.TrimPrefix(req.Name, "operations/")` and looks
               up by the full project-scoped name.

            Actually the cleanest approach given the existing code:
            - The GetOperation gRPC handler receives the `name` field directly from the
              HTTP path via `pathParams["name"]`.
            - The pattern `GET /v1/operations/**` puts everything after `/v1/operations/`
              into `name`. So a GET to `/v1/operations/projects/P/locations/L/operations/ID`
              would work — but that's an ugly double path.
            - Better: register a new mux pattern that captures the full path after /v1/
              as the name. Use `runtime.NewPattern`:

            ```go
            // Pattern: GET /v1/projects/{project}/locations/{location}/operations/{op}
            // Token sequence for runtime.NewPattern:
            //   2=literal, 0=index into strings array
            //   4,1,5,N = capture N segments into param at strings[N]
            patternGetProjectOp := runtime.MustPattern(runtime.NewPattern(
                1, // version
                []int{2, 0, 2, 1, 4, 1, 5, 2, 2, 3, 4, 1, 5, 4, 2, 5, 4, 1, 5, 6},
                // v1, projects, {project}, locations, {location}, operations, {op}
                []string{"v1", "projects", "project", "locations", "location", "operations", "op"},
                "",
            ))
            ```

            ### Recommended approach: URL-rewriting middleware + direct gRPC for list

            In `internal/gateway/gateway.go`, before returning the Gateway in `New()`,
            capture the opsClient (already created at line 46 as `longrunninggw.NewOperationsClient(conn)`):

            ```go
            // Store opsClient in Gateway struct for use in the rewriter:
            // Add field: opsClient longrunninggw.OperationsClient
            // Or capture it in a closure in New():
            opsClient := longrunninggw.NewOperationsClient(conn)
            ```

            Define this helper function (or inline it):

            ```go
            // projectScopedLRORewriter intercepts GET requests for project-scoped operation paths
            // and either rewrites them to the registered /v1/operations/** pattern (GetOperation)
            // or calls the gRPC ListOperations directly (ListOperations).
            //
            // Pattern matched: GET /v1/projects/{p}/locations/{l}/operations[/{id}]
            //
            // GetOperation (path has a trailing /{id}):
            //   Rewrites URL to /v1/operations/{full-name} where full-name =
            //   "projects/P/locations/L/operations/ID". The generated handler puts this
            //   into the `name` field. lro.Store.GetOperation does TrimPrefix("operations/")
            //   which is a no-op here, so it looks up "projects/P/locations/L/operations/ID"
            //   directly — matching the stored key.
            //
            // ListOperations (path ends with /operations, no trailing id):
            //   Calls opsClient.ListOperations directly with Name="projects/P/locations/L".
            //   lro.Store.ListOperations uses this as a key prefix to filter operations.
            func projectScopedLRORewriter(opsClient longrunninggw.OperationsClient, mux *runtime.ServeMux) http.Handler {
                return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                    const v1prefix = "/v1/"
                    if r.Method == http.MethodGet && strings.HasPrefix(r.URL.Path, v1prefix) {
                        path := r.URL.Path[len(v1prefix):]  // e.g. "projects/P/locations/L/operations/ID"
                        lastOp := strings.LastIndex(path, "/operations")
                        if lastOp >= 0 && strings.HasPrefix(path, "projects/") {
                            suffix := path[lastOp+len("/operations"):]  // "" or "/ID"
                            if suffix == "" || suffix == "/" {
                                // ListOperations: parent = path up to /operations
                                parent := path[:lastOp]  // "projects/P/locations/L"
                                resp, err := opsClient.ListOperations(r.Context(),
                                    &longrunninggw.ListOperationsRequest{Name: parent})
                                if err != nil {
                                    runtime.DefaultHTTPErrorHandler(r.Context(), mux,
                                        runtime.MarshalerForRequest(mux, r), w, r, err)
                                    return
                                }
                                w.Header().Set("Content-Type", "application/json")
                                m := runtime.MarshalerForRequest(mux, r)
                                _ = m.NewEncoder(w).Encode(resp)
                                return
                            }
                            // GetOperation: full path after /v1/ is the operation name.
                            // Rewrite to /v1/operations/{name} which hits the registered pattern.
                            r2 := r.Clone(r.Context())
                            r2.URL.Path = "/v1/operations/" + path
                            mux.ServeHTTP(w, r2)
                            return
                        }
                    }
                    mux.ServeHTTP(w, r)
                })
            }
            ```

            Apply the rewriter in `Start()`:
            ```go
            g.httpSrv = &http.Server{Handler: projectScopedLRORewriter(g.opsClient, g.mux)}
            ```

            And store opsClient in the Gateway struct:
            ```go
            type Gateway struct {
                mux       *runtime.ServeMux
                httpSrv   *http.Server
                conn      *grpc.ClientConn
                opsClient longrunninggw.OperationsClient  // for LRO rewriter
            }
            ```

            In `New()`, after `RegisterOperationsHandlerClient`:
            ```go
            return &Gateway{mux: mux, conn: conn, opsClient: longrunninggw.NewOperationsClient(conn)}, nil
            ```

            Add import `"strings"` if not already present.

            Implement a clean version of this rewriter in `internal/gateway/gateway.go`.
            Import "strings" (already used or add it).

            ### Tests
            If `internal/gateway/gateway_test.go` exists, add test cases verifying:
            1. GET /v1/projects/P/locations/L/operations/ID returns the operation.
            2. GET /v1/projects/P/locations/L/operations returns a list.

            ### Verification gate
            ```
            go build ./...
            go vet ./...
            go test ./internal/gateway/... ./internal/lro/...
            ```

            ### Constraints
            - Only modify `internal/gateway/gateway.go`.
            - Do NOT modify `internal/gen/google/longrunning/operations.pb.gw.go` (generated).
            - Do NOT modify `internal/lro/store.go` (Agent B's file).
          files:
            - internal/gateway/gateway.go
        - id: B
          task: |
            ## Agent B — Delete→Empty, Multi-Error Validation, IAM Permissive Fix (C5 + I5 + I6 + I8)

            ### What to implement

            **Bug 1 (I5/I8): Delete LRO returns deleted resource instead of Empty**
            In `internal/server/server.go`, find ALL Delete* methods. Each currently does:
              `return s.lro.CreateDone(parent, theDeletedResource)`
            Change all 7 of them to:
              `return s.lro.CreateDone(parent, &emptypb.Empty{})`
            The 7 methods: DeleteTrigger, DeleteChannel, DeleteChannelConnection,
            DeleteMessageBus, DeletePipeline, DeleteEnrollment, DeleteGoogleApiSource.
            Add import `"google.golang.org/protobuf/types/known/emptypb"` if not present.

            **Bug 2 (I6 + P7): CreateTrigger multi-error validation and camelCase fix**
            In `internal/server/server.go`, refactor CreateTrigger validation:
            - Collect all missing-field errors into a slice before returning.
            - Return them as a gRPC status with code InvalidArgument and a BadRequest
              detail containing one FieldViolation per missing field.
            - Also change "trigger_id is required" to "triggerId is required" (P7).

            Import needed:
            ```go
            "google.golang.org/genproto/googleapis/rpc/errdetails"
            grpcstatus "google.golang.org/grpc/status"
            ```

            Pattern:
            ```go
            func (s *Server) CreateTrigger(ctx context.Context, req *eventarcpb.CreateTriggerRequest) (*longrunningpb.Operation, error) {
                var violations []*errdetails.BadRequest_FieldViolation
                if req.GetParent() == "" {
                    violations = append(violations, &errdetails.BadRequest_FieldViolation{Field: "parent", Description: "parent is required"})
                }
                if req.GetTriggerId() == "" {
                    violations = append(violations, &errdetails.BadRequest_FieldViolation{Field: "triggerId", Description: "triggerId is required"})
                }
                if req.GetTrigger() == nil {
                    violations = append(violations, &errdetails.BadRequest_FieldViolation{Field: "trigger", Description: "trigger is required"})
                } else {
                    if req.GetTrigger().GetDestination() == nil {
                        violations = append(violations, &errdetails.BadRequest_FieldViolation{Field: "trigger.destination", Description: "trigger.destination is required"})
                    }
                    if len(req.GetTrigger().GetEventFilters()) == 0 {
                        violations = append(violations, &errdetails.BadRequest_FieldViolation{Field: "trigger.eventFilters", Description: "trigger.event_filters must not be empty"})
                    }
                }
                if len(violations) > 0 {
                    st := grpcstatus.New(codes.InvalidArgument, violations[0].Description)
                    if br, err := st.WithDetails(&errdetails.BadRequest{FieldViolations: violations}); err == nil {
                        return nil, br.Err()
                    }
                    return nil, st.Err()
                }
                // ... rest of method unchanged
            }
            ```

            **Bug 3 (C5): IAM permissive mode allows unauthenticated requests**
            In `internal/server/server.go`, in `checkPermission`, add an early deny
            for empty principal when in permissive mode. Find the iamMode type by
            looking at the import `emulatorauth "github.com/blackwell-systems/gcp-emulator-auth"`.
            The existing code uses `s.iamMode = config.Mode` and `config.Mode.IsEnabled()`.
            Check if there is an `emulatorauth.AuthModePermissive` constant. If the type
            is a string type, compare as:

            ```go
            func (s *Server) checkPermission(ctx context.Context, permission string, resource string) error {
                if s.iamClient == nil {
                    return nil // IAM disabled
                }

                principal := emulatorauth.ExtractPrincipalFromContext(ctx)

                // Permissive mode: no principal → deny (matches documented behavior table)
                if principal == "" && string(s.iamMode) == "permissive" {
                    return status.Errorf(codes.PermissionDenied,
                        "permissive mode requires authentication: no principal in request")
                }

                // ... rest unchanged
            }
            ```

            ### Tests to add/update in internal/server/server_test.go
            1. `TestDeleteTrigger_LROResponseIsEmpty`: create a trigger, delete it, unpack the
               LRO response anypb.Any, verify it is *emptypb.Empty not *eventarcpb.Trigger.
            2. `TestCreateTrigger_MultipleValidationErrors`: call CreateTrigger with empty
               request body; verify the returned status has BadRequest details with at least
               2 FieldViolations (triggerId + trigger).
            3. `TestCreateTrigger_TriggerIdCamelCase`: call with no triggerId; verify error
               message contains "triggerId" (camelCase) not "trigger_id".
            4. `TestCheckPermission_PermissiveNoPrincipal`: create a server with iamMode=permissive
               (mock or set directly); verify checkPermission returns PermissionDenied when
               principal is empty. (If setting up a real IAM client is complex, test via
               the iamMode string comparison directly.)

            ### Tests to update in internal/lro/store_test.go
            Review existing tests in lro/store_test.go. If any test unpacks a delete LRO
            response and expects a Trigger (old behavior), update it to expect emptypb.Empty.
            If no such test exists, add one: `TestCreateDone_WithEmpty` — verify CreateDone
            with &emptypb.Empty{} produces an Operation whose Response unpacks to *emptypb.Empty.

            ### Verification gate
